    function RoadmapView({ projects, scale, onScaleChange }) {
      const [searchTerm, setSearchTerm] = useState("");
      const [departmentFilter, setDepartmentFilter] = useState("All departments");
      const [managerFilter, setManagerFilter] = useState("All PMs");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");
      const [statusFilter, setStatusFilter] = useState("All statuses");
      const [isPortfolioViewOpen, setIsPortfolioViewOpen] = useState(false);
      const [expandedProjectIds, setExpandedProjectIds] = useState([]);
      const [show2027, setShow2027] = useState(false);
      const [selectedMilestoneId, setSelectedMilestoneId] = useState(null);

      const monthlySegments = [
        "Jan", "Feb", "Mar", "Apr", "May", "Jun",
        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
      ];
      const portfolioMonthlySegments = [
        "Jan 26", "Feb 26", "Mar 26", "Apr 26", "May 26", "Jun 26",
        "Jul 26", "Aug 26", "Sep 26", "Oct 26", "Nov 26", "Dec 26",
        "Jan 27", "Feb 27", "Mar 27", "Apr 27", "May 27", "Jun 27",
        "Jul 27", "Aug 27", "Sep 27", "Oct 27", "Nov 27", "Dec 27"
      ];
      const quarterlySegments = ["Q1", "Q2", "Q3", "Q4"];
      const portfolioQuarterlySegments = ["Q1 26", "Q2 26", "Q3 26", "Q4 26", "Q1 27", "Q2 27", "Q3 27", "Q4 27"];
      const singleYearQuarterSegments = ["2026 Q1", "2026 Q2", "2026 Q3", "2026 Q4"];
      const portfolioYearlySegments = ["2026 Q1", "2026 Q2", "2026 Q3", "2026 Q4", "2027 Q1", "2027 Q2", "2027 Q3", "2027 Q4"];
      const lifecycleSegments = scale === "monthly"
        ? (show2027 ? portfolioMonthlySegments : monthlySegments)
        : scale === "quarterly"
          ? (show2027 ? portfolioQuarterlySegments : quarterlySegments)
          : (show2027 ? portfolioYearlySegments : singleYearQuarterSegments);
      const lifecycleSegmentCount = scale === "monthly" ? (show2027 ? 24 : 12) : (show2027 ? 8 : 4);
      const toDisplayIndex = (absoluteMonthIndex) => scale === "monthly" ? absoluteMonthIndex : Math.ceil(absoluteMonthIndex / 3);
      const portfolioSegments = scale === "monthly"
        ? (show2027 ? portfolioMonthlySegments : monthlySegments)
        : scale === "quarterly"
          ? (show2027 ? portfolioQuarterlySegments : quarterlySegments)
          : (show2027 ? portfolioYearlySegments : singleYearQuarterSegments);
      const portfolioSegmentCount = scale === "monthly" ? (show2027 ? 24 : 12) : (show2027 ? 8 : 4);

      const phaseTemplates = [
        {
          key: "discovery",
          label: "Discovery",
          description: "Understand the problem, the need, and the right outcome.",
          duration: 2,
          tone: "slate",
          tasks: (project) => [`Discovery work`, `Confirm scope and needs for ${project.name}`]
        },
        {
          key: "definition",
          label: "Definition / Planning",
          description: "Shape the plan, budget, timeline, and governance.",
          duration: 2,
          tone: "blue",
          tasks: () => [`Plan and design`, `Confirm approach, budget, and governance`]
        },
        {
          key: "delivery",
          label: "Delivery",
          description: "Build, test, and roll out the agreed change.",
          duration: 4,
          tone: "teal",
          tasks: (project) => [`Delivery in flight`, `Build and roll out the ${project.projectType.toLowerCase()}`]
        },
        {
          key: "closure",
          label: "Closure",
          description: "Close the project and hand over ownership and benefits.",
          duration: 2,
          tone: "amber",
          tasks: () => [`Close and hand over`, `Confirm benefits and BAU ownership`]
        }
      ];

      const departments = [...new Set(projects.filter((project) => project.status !== "Draft").map((project) => project.department))];
      const managers = [...new Set(projects.filter((project) => project.status !== "Draft").map((project) => project.projectManager))];
      const sponsors = [...new Set(projects.filter((project) => project.status !== "Draft").map((project) => project.primarySponsor))];
      const statuses = [...new Set(projects.filter((project) => project.status !== "Draft").map((project) => project.status))];

      const roadmapSourceProjects = projects.filter((project) => project.status !== "Draft");
      const roadmapProjects = roadmapSourceProjects
        .filter((project) => {
          const haystack = [project.name, project.projectManager, project.primarySponsor, project.department, project.projectType].join(" ").toLowerCase();
          const matchesSearch = !searchTerm || haystack.includes(searchTerm.toLowerCase());
          const matchesDepartment = departmentFilter === "All departments" || project.department === departmentFilter;
          const matchesManager = managerFilter === "All PMs" || project.projectManager === managerFilter;
          const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;
          const matchesStatus = statusFilter === "All statuses" || project.status === statusFilter;
          return matchesSearch && matchesDepartment && matchesManager && matchesSponsor && matchesStatus;
        })
        .map((project, index) => {
          const startMonth = project.timelineStartMonth || Math.min(4, 1 + (index % 4));
          const endMonth = project.timelineEndMonth || Math.min(12, startMonth + Math.max(3, Math.min(10, 4 + Math.round(project.completionPercentage / 20))) - 1);
          const assignedYear = project.timelineYear || (index < Math.ceil(roadmapSourceProjects.length * 0.75) ? 2026 : 2027);
          const timelineStartIndex = (assignedYear === 2026 ? 0 : 12) + startMonth;
          const timelineEndIndex = Math.min(24, (assignedYear === 2026 ? 0 : 12) + endMonth);
          const currentPhaseProgress = typeof project.currentPhaseProgress === "number" ? project.currentPhaseProgress : project.completionPercentage;
          const absoluteProjectStart = (assignedYear === 2026 ? 0 : 12) + startMonth;
          const absoluteProjectEnd = (assignedYear === 2026 ? 0 : 12) + endMonth;
          const phases = project.roadmapPhase === "submitted"
            ? [{
                key: "submitted",
                label: "Submitted, pending decision board review",
                description: "Waiting for the decision board to confirm whether the project should proceed.",
                tone: "slate",
                start: startMonth,
                end: endMonth,
                absoluteStart: absoluteProjectStart,
                absoluteEnd: absoluteProjectEnd,
                displayStart: toDisplayIndex(absoluteProjectStart),
                displayEnd: toDisplayIndex(absoluteProjectEnd),
                phaseProgress: Math.max(0, Math.min(100, currentPhaseProgress)),
                milestoneMonth: endMonth,
                milestoneSegment: toDisplayIndex(absoluteProjectEnd),
                currentTask: "Submitted and waiting for decision board review",
                supportingTask: "No discovery, planning, or delivery activity starts until the board confirms the next step."
              }]
            : (() => {
                let currentMonth = startMonth;
                const phaseOrder = phaseTemplates.map((template) => template.key);
                const currentPhaseIndex = Math.max(0, phaseOrder.indexOf(project.roadmapPhase || "discovery"));

                return phaseTemplates.map((template, phaseIndex) => {
                    const start = currentMonth;
                    const end = Math.min(12, currentMonth + template.duration - 1);
                    currentMonth = end + 1;
                    const absoluteStart = (assignedYear === 2026 ? 0 : 12) + start;
                    const absoluteEnd = (assignedYear === 2026 ? 0 : 12) + end;
                    const tasks = template.tasks(project);
                    let phaseProgress = 0;
                    if (phaseIndex < currentPhaseIndex) {
                      phaseProgress = 100;
                    } else if (phaseIndex === currentPhaseIndex) {
                    phaseProgress = Math.max(0, Math.min(100, currentPhaseProgress));
                  }

                    return {
                      ...template,
                      start,
                      end,
                      absoluteStart,
                      absoluteEnd,
                      displayStart: toDisplayIndex(absoluteStart),
                      displayEnd: toDisplayIndex(absoluteEnd),
                      phaseProgress,
                      milestoneMonth: end,
                      milestoneSegment: toDisplayIndex(absoluteEnd),
                      currentTask: tasks[0],
                      supportingTask: tasks[1]
                    };
                });
              })();

          let portfolioTone = "blue";
          let portfolioCategory = "In progress";
          if (project.status === "Submitted") {
            portfolioTone = "slate";
            portfolioCategory = "Submitted, needs discussion";
          } else if (project.status === "Planning") {
            portfolioTone = "purple";
            portfolioCategory = "Approved, awaiting start";
          } else if (project.status === "On hold") {
            portfolioTone = "amber";
            portfolioCategory = "On hold";
          } else if (project.status === "Completed") {
            portfolioTone = "green";
            portfolioCategory = "Completed";
          }

          return {
            project,
            phases,
            portfolioYear: assignedYear,
            timelineStartIndex,
            timelineEndIndex,
            portfolioTone,
            portfolioCategory
          };
        });

      const laneStyle = {
        "--roadmap-segments": lifecycleSegmentCount
      };
      const scales = [
        { key: "monthly", label: "Monthly" },
        { key: "quarterly", label: "Quarterly" },
        { key: "yearly", label: "Yearly" }
      ];
      const portfolioViewProjects = roadmapProjects
        .map((item) => {
          if (!show2027 && item.timelineStartIndex > 12) return null;
          const clippedStart = Math.max(1, item.timelineStartIndex);
          const clippedEnd = Math.min(show2027 ? 24 : 12, item.timelineEndIndex);
          if (clippedStart > clippedEnd) return null;

          const visibleStart = scale === "monthly" ? clippedStart : Math.ceil(clippedStart / 3);
          const visibleEnd = scale === "monthly" ? clippedEnd : Math.ceil(clippedEnd / 3);

          return { ...item, visibleStart, visibleEnd };
        })
        .filter(Boolean);
      const lifecycleVisibleProjects = roadmapProjects.filter((item) => show2027 || item.portfolioYear === 2026);
      const departmentOrder = { IT: 1, PMO: 2, Marketing: 3, People: 4, HR: 5, Facilities: 6 };
      const sortByDepartment = (items, projectSelector = (item) => item.project || item) => [...items].sort((left, right) => {
        const leftProject = projectSelector(left);
        const rightProject = projectSelector(right);
        const leftSubmitted = leftProject.status === "Submitted" ? 1 : 0;
        const rightSubmitted = rightProject.status === "Submitted" ? 1 : 0;
        if (leftSubmitted !== rightSubmitted) return leftSubmitted - rightSubmitted;
        const leftOrder = departmentOrder[leftProject.department] || 99;
        const rightOrder = departmentOrder[rightProject.department] || 99;
        if (leftOrder !== rightOrder) return leftOrder - rightOrder;
        return leftProject.name.localeCompare(rightProject.name);
      });
      const groupedPortfolioViewProjects = sortByDepartment(portfolioViewProjects);
      const groupedRoadmapProjects = sortByDepartment(lifecycleVisibleProjects);

      const clearRoadmapFilters = () => {
        setSearchTerm("");
        setDepartmentFilter("All departments");
        setManagerFilter("All PMs");
        setSponsorFilter("All sponsors");
        setStatusFilter("All statuses");
      };

      const toggleRoadmapProject = (projectId) => {
        setExpandedProjectIds((current) => (
          current.includes(projectId)
            ? current.filter((id) => id !== projectId)
            : [...current, projectId]
        ));
      };

      const getMilestoneSummary = (project, phase) => {
        const milestoneDate = lifecycleSegments[Math.max(0, (phase.milestoneSegment || phase.displayEnd || 1) - 1)] || "";
        const achievedText = phase.phaseProgress >= 100
          ? `${phase.label} is complete and ready to hand into the next stage.`
          : phase.phaseProgress > 0
            ? `${phase.label} is underway and key work has already started.`
            : `${phase.label} has been mapped out and is waiting to begin.`;
        return {
          title: `${project.name} milestone`,
          milestone: phase.currentTask,
          achieved: achievedText,
          byWhen: milestoneDate,
          next: phase.supportingTask || "Confirm the next agreed step and owner."
        };
      };

      const getMilestonePopoverStyle = (phase) => {
        const anchorPercent = ((phase.displayEnd - 0.2) / lifecycleSegmentCount) * 100;
        if (anchorPercent >= 84) {
          return {
            right: "8px",
            left: "auto",
            top: "-12px",
            transform: "translateY(-100%)"
          };
        }
        if (anchorPercent <= 16) {
          return {
            left: "8px",
            right: "auto",
            top: "-12px",
            transform: "translateY(-100%)"
          };
        }
        return {
          left: `${anchorPercent}%`,
          right: "auto",
          top: "-12px",
          transform: "translate(-50%, -100%)"
        };
      };

      const PortfolioViewModal = () => (
        <Modal isOpen={isPortfolioViewOpen} onClose={() => setIsPortfolioViewOpen(false)} titleId="portfolioViewTitle" panelClassName="modal-panel-fullscreen modal-panel-portfolio-view">
          <div className="detail-modal overall-roadmap-modal">
            <div className="detail-header">
              <div>
                <p className="eyebrow">Roadmap</p>
                <h2 id="portfolioViewTitle" className="detail-title">Portfolio view</h2>
              </div>
              <button className="icon-btn" type="button" aria-label="Close portfolio view" onClick={() => setIsPortfolioViewOpen(false)}><Icon icon="close" className="icon-only-svg" /></button>
            </div>

            <div className="roadmap-controls roadmap-controls-compact">
              <div className="roadmap-toggle-group">
                <div className="roadmap-toggle">
                  {scales.map((item) => (
                    <button key={`portfolio-${item.key}`} className={`secondary-btn roadmap-toggle-btn ${scale === item.key ? "roadmap-toggle-btn-active" : ""}`} type="button" onClick={() => onScaleChange(item.key)}>
                      {item.label}
                    </button>
                  ))}
                </div>
                <button className={`secondary-btn roadmap-year-toggle ${show2027 ? "roadmap-year-toggle-active" : ""}`} type="button" onClick={() => setShow2027((current) => !current)}>
                  {show2027 ? "Showing 2027" : "Show 2027"}
                </button>
              </div>
            </div>

            <div className="portfolio-legend">
              <span className="portfolio-legend-item"><span className="portfolio-legend-dot portfolio-legend-blue"></span>In progress</span>
              <span className="portfolio-legend-item"><span className="portfolio-legend-dot portfolio-legend-purple"></span>Approved, awaiting start</span>
              <span className="portfolio-legend-item"><span className="portfolio-legend-dot portfolio-legend-green"></span>Completed</span>
              <span className="portfolio-legend-item"><span className="portfolio-legend-dot portfolio-legend-amber"></span>On hold</span>
              <span className="portfolio-legend-item"><span className="portfolio-legend-dot portfolio-legend-slate"></span>Submitted, needs discussion</span>
            </div>

            <div className="roadmap-board roadmap-board-compact portfolio-timeline-board">
              <div className="portfolio-timeline-header">
                <div className="roadmap-grid-title">Projects</div>
                <div className="roadmap-segment-row portfolio-segment-row">
                  {portfolioSegments.map((segment) => <div key={`portfolio-${segment}`} className="roadmap-segment-cell">{segment}</div>)}
                </div>
              </div>

              <div className="portfolio-timeline-body">
                {groupedPortfolioViewProjects.map((item) => (
                  <div className="portfolio-timeline-row" key={`portfolio-row-${item.project.id}`}>
                    <div className="portfolio-timeline-project">
                      <strong>{item.project.name}</strong>
                      <span><bdi className="department-badge">{item.project.department}</bdi>{item.project.status === "Submitted" ? "Submitted, needs discussion" : getRoadmapPhaseShortLabel(item.project.roadmapPhase)}</span>
                    </div>
                    <div className="roadmap-track portfolio-timeline-track" style={{ "--roadmap-segments": portfolioSegmentCount }}>
                      <div
                        className={`roadmap-task-bar portfolio-task-bar roadmap-bar-${item.portfolioTone}`}
                        style={{
                          left: `${((item.visibleStart - 1) / portfolioSegmentCount) * 100}%`,
                          width: `${((item.visibleEnd - item.visibleStart + 1) / portfolioSegmentCount) * 100}%`
                        }}
                      >
                        <div className={`roadmap-task-progress roadmap-bar-progress-${item.portfolioTone}`} style={{ width: `${item.project.completionPercentage}%` }}></div>
                        <span className="roadmap-task-percent">{item.project.completionPercentage}%</span>
                      </div>
                    </div>
                  </div>
                ))}
                {!portfolioViewProjects.length && <EmptyState title="No projects are mapped to this portfolio view yet." action="Try a different year or zoom level, or clear the roadmap filters to bring projects back into view." />}
              </div>
            </div>
          </div>
        </Modal>
      );

      return (
        <>
          <section className="roadmap-shell">
            <div className="section-header">
              <p className="section-title">Roadmap</p>
              <p className="section-copy">A cleaner lifecycle roadmap view showing each project across discovery, planning, delivery, and closure.</p>
            </div>

            <div className="roadmap-toolbar">
              <div className="search-wrap roadmap-search"><input className="search-input" type="search" placeholder="Search projects..." value={searchTerm} onChange={(event) => setSearchTerm(event.target.value)} /></div>
              <select className="roadmap-filter-select" value={departmentFilter} onChange={(event) => setDepartmentFilter(event.target.value)}><option>All departments</option>{departments.map((item) => <option key={item}>{item}</option>)}</select>
              <select className="roadmap-filter-select" value={managerFilter} onChange={(event) => setManagerFilter(event.target.value)}><option>All PMs</option>{managers.map((item) => <option key={item}>{item}</option>)}</select>
              <select className="roadmap-filter-select" value={sponsorFilter} onChange={(event) => setSponsorFilter(event.target.value)}><option>All sponsors</option>{sponsors.map((item) => <option key={item}>{item}</option>)}</select>
              <select className="roadmap-filter-select" value={statusFilter} onChange={(event) => setStatusFilter(event.target.value)}><option>All statuses</option>{statuses.map((item) => <option key={item}>{item}</option>)}</select>
              <button className="secondary-btn clear-filters-btn" type="button" onClick={clearRoadmapFilters}>Clear filters</button>
            </div>

            <div className="roadmap-controls">
              <div className="roadmap-controls-copy">
                <div className="roadmap-toggle-group">
                  <div className="roadmap-toggle">
                    {scales.map((item) => (
                      <button key={item.key} className={`secondary-btn roadmap-toggle-btn ${scale === item.key ? "roadmap-toggle-btn-active" : ""}`} type="button" onClick={() => onScaleChange(item.key)}>
                        {item.label}
                      </button>
                    ))}
                  </div>
                  <button className={`secondary-btn roadmap-year-toggle ${show2027 ? "roadmap-year-toggle-active" : ""}`} type="button" onClick={() => setShow2027((current) => !current)}>
                    {show2027 ? "Showing 2027" : "Show 2027"}
                  </button>
                </div>
                <p className="roadmap-toggle-note">Zoom in or out on the timeline.</p>
              </div>
              <div className="roadmap-portfolio-copy">
                <button className="secondary-btn roadmap-overall-btn portfolio-view-trigger" type="button" onClick={() => setIsPortfolioViewOpen(true)}>Portfolio view</button>
                <p className="roadmap-toggle-note">See all projects on a single timeline.</p>
              </div>
            </div>

            <div className="roadmap-board">
              <div className="roadmap-grid-header">
                <div className="roadmap-grid-title">Project lifecycle</div>
                <div className="roadmap-segment-row">
                  {lifecycleSegments.map((segment) => <div key={segment} className="roadmap-segment-cell">{segment}</div>)}
                </div>
              </div>

              <div className="roadmap-list">
                {groupedRoadmapProjects.map((item) => {
                  const isExpanded = expandedProjectIds.length === 0 ? groupedRoadmapProjects[0]?.project.id === item.project.id : expandedProjectIds.includes(item.project.id);
                  return (
                    <article className="roadmap-card" key={`roadmap-${item.project.id}`}>
                      <div className="roadmap-project-header">
                        <div>
                          <h3>{item.project.name}</h3>
                          <p className="roadmap-project-summary"><bdi className="department-badge">{item.project.department}</bdi>{getRoadmapPhaseLabel(item.project.roadmapPhase)}</p>
                          <p className="roadmap-project-owners">Sponsor: {item.project.primarySponsor} · PM: {item.project.projectManager}</p>
                          {!isExpanded && <p className="roadmap-expand-hint">Click to expand</p>}
                        </div>
                        <div className="roadmap-project-badges">
                          <span className={`status-pill ${getStatusClass(item.project.status)}`}>{item.project.status}</span>
                          <span className="roadmap-completion-badge">{item.project.completionPercentage}% complete</span>
                          <button className="secondary-btn roadmap-accordion-btn" type="button" onClick={() => toggleRoadmapProject(item.project.id)}>
                            {isExpanded ? "Collapse" : "Expand"}
                          </button>
                        </div>
                      </div>

                      {isExpanded && <div className="roadmap-phase-list roadmap-phase-list-simple">
                        {item.phases.map((phase) => {
                          const milestoneId = `${item.project.id}-${phase.key}`;
                          const milestoneSummary = getMilestoneSummary(item.project, phase);
                          const isMilestoneOpen = selectedMilestoneId === milestoneId;
                          return (
                          <div className="roadmap-phase-row roadmap-phase-row-simple" key={milestoneId}>
                            <div className="roadmap-phase-meta">
                              <p className="roadmap-phase-title">{phase.label}</p>
                              <p className="roadmap-phase-description">{phase.description}</p>
                              <p className="roadmap-phase-task">{phase.currentTask}</p>
                            </div>

                            <div className="roadmap-phase-track-wrap">
                              <div className="roadmap-track" style={laneStyle}>
                                <div
                                  className={`roadmap-task-bar roadmap-bar-${phase.tone}`}
                                  style={{
                                    left: `${((phase.displayStart - 1) / lifecycleSegmentCount) * 100}%`,
                                    width: `${((phase.displayEnd - phase.displayStart + 1) / lifecycleSegmentCount) * 100}%`
                                  }}
                                >
                                  <div className={`roadmap-task-progress roadmap-bar-progress-${phase.tone}`} style={{ width: `${phase.phaseProgress}%` }}></div>
                                  <span className="roadmap-task-percent">{phase.phaseProgress}%</span>
                                  <button
                                    className="roadmap-milestone roadmap-milestone-end"
                                    type="button"
                                    title={`${milestoneSummary.milestone} • By ${milestoneSummary.byWhen}`}
                                    aria-label={`Open milestone details for ${phase.label}`}
                                    onClick={(event) => {
                                      event.stopPropagation();
                                      setSelectedMilestoneId((current) => current === milestoneId ? null : milestoneId);
                                    }}
                                  >
                                    <span className="roadmap-milestone-diamond"></span>
                                  </button>
                                </div>
                                {isMilestoneOpen && (
                                  <div className="roadmap-milestone-popover" style={getMilestonePopoverStyle(phase)}>
                                    <strong>{milestoneSummary.milestone}</strong>
                                    <p><bdi>What this milestone is about:</bdi> {phase.label}</p>
                                    <p><bdi>What we have achieved:</bdi> {milestoneSummary.achieved}</p>
                                    <p><bdi>By when:</bdi> {milestoneSummary.byWhen}</p>
                                    <p><bdi>What is next:</bdi> {milestoneSummary.next}</p>
                                  </div>
                                )}
                              </div>
                            </div>
                          </div>
                        )})}
                      </div>}
                    </article>
                  );
                })}
              </div>

              {!groupedRoadmapProjects.length && <EmptyState title="No roadmap items match the current filters." action="Clear the filters, switch off the 2027 view, or search for a broader term to bring projects back into the roadmap." />}
            </div>
          </section>

          <PortfolioViewModal />
        </>
      );
    }

    function getGovernanceRagClass(rag) {
      if (rag === "Green") return "rag-green";
      if (rag === "Amber") return "rag-amber";
      return "rag-red";
    }

    function getGovernanceIssueSeverity(project) {
      if (project.status === "On hold" || project.currentRisk === "High") return "High";
      if (project.status === "Submitted" || project.currentRisk === "Medium") return "Medium";
      return "Low";
    }

    function buildGovernanceSignals(project) {
      const time = project.status === "On hold"
        ? "Red"
        : project.status === "Submitted" || project.roadmapPhase === "discovery" || project.roadmapPhase === "submitted"
          ? "Amber"
          : project.completionPercentage >= 70
            ? "Green"
            : project.completionPercentage >= 35
              ? "Amber"
              : "Red";

      const budget = project.currentRisk === "Low"
        ? "Green"
        : project.currentRisk === "Medium"
          ? "Amber"
          : "Red";

      const scope = project.status === "Submitted"
        ? "Amber"
        : project.roadmapPhase === "definition" || project.roadmapPhase === "discovery"
          ? "Amber"
          : project.completionPercentage >= 60
            ? "Green"
            : "Amber";

      return { time, budget, scope };
    }

    function getGovernanceSummary(project) {
      if (project.status === "Submitted") {
        return {
          upcomingRisk: {
            title: "Waiting for decision board review.",
            cause: "The proposal has been submitted and is waiting for PMO and department review before a decision is made.",
            owner: project.primarySponsor,
            deadline: "Next decision board"
          },
          existingIssue: null
        };
      }

      if (project.status === "On hold" || project.currentRisk === "High") {
        return {
          upcomingRisk: {
            title: project.steeringDecisionNeeded || "A decision is needed to get the project back on track.",
            cause: project.next30DaysPipeline || project.currentPosition || "The next step needs a clear owner and decision before progress can continue.",
            owner: project.projectManager,
            deadline: "Next monthly review"
          },
          existingIssue: project.whatHappenedLastMonth || "A live issue is affecting delivery and needs active follow-up."
        };
      }

      return {
        upcomingRisk: null,
        existingIssue: null
      };
    }

    function getReportingPeriodLabel() {
      return new Date().toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    }

    function formatMonthYear(month, year) {
      if (!month) return "Date to be confirmed";
      return new Date(year || new Date().getFullYear(), Math.max(0, month - 1), 1)
        .toLocaleDateString("en-GB", { month: "long", year: "numeric" });
    }

    function getRoadmapCheckpointLabel(phaseKey) {
      if (phaseKey === "submitted") return "Decision board review";
      if (phaseKey === "discovery") return "Discovery checkpoint";
      if (phaseKey === "definition") return "Planning baseline";
      if (phaseKey === "delivery") return "Delivery milestone";
      if (phaseKey === "closure") return "Closure handover";
      return "Next checkpoint";
    }

    function scoreToRag(score) {
      if (score >= 4) return "Green";
      if (score >= 3) return "Amber";
      return "Red";
    }

    function textToBulletPoints(text, fallback, maxItems = 3) {
      const normalised = `${text || ""}`.replace(/\s+/g, " ").trim();
      if (!normalised) return [fallback];

      let parts = normalised
        .split(/(?:\.\s+|\n+)/)
        .map((part) => part.trim())
        .filter(Boolean);

      if (parts.length === 1) {
        parts = normalised
          .split(/,\s+/)
          .map((part) => part.trim())
          .filter(Boolean);
      }

      const cleaned = parts
        .map((part) => part.replace(/\.$/, "").trim())
        .filter(Boolean);

      return (cleaned.length ? cleaned : [fallback]).slice(0, maxItems);
    }

    function isDecisionRequired(project) {
      if (!project.steeringDecisionNeeded) return false;
      if (/^no steering decision/i.test(project.steeringDecisionNeeded)) return false;
      return project.status !== "Completed";
    }

    function getStakeholderOverallRagReason(project) {
      if (project.overallRag === "Red") {
        if (project.governanceRag.time === "Red") return "Schedule confidence is low and senior support is needed to protect delivery.";
        if (project.governanceRag.budget === "Red") return "Delivery risk is high and cost or control needs active leadership attention.";
        return "Scope is not settled enough yet and the delivery baseline needs tighter control.";
      }

      if (project.overallRag === "Amber") {
        if (project.status === "Submitted") return "The project is waiting for approval before delivery can start.";
        if (project.governanceRag.scope === "Amber") return "Scope is still being shaped, so the project needs close monitoring.";
        return "Delivery is moving, but one or two areas still need active oversight.";
      }

      return "Delivery is on track and only routine monitoring is needed right now.";
    }

    function buildGovernanceProject(project) {
      const governanceRag = buildGovernanceSignals(project);
      const overallRag = governanceRag.time === "Red" || governanceRag.budget === "Red" || governanceRag.scope === "Red"
        ? "Red"
        : governanceRag.time === "Amber" || governanceRag.budget === "Amber" || governanceRag.scope === "Amber"
          ? "Amber"
          : "Green";
      const governanceSummary = getGovernanceSummary(project);
      const actionOwner = governanceSummary.upcomingRisk?.owner && governanceSummary.upcomingRisk.owner !== "To be confirmed"
        ? governanceSummary.upcomingRisk.owner
        : project.projectManager && project.projectManager !== "To be confirmed"
          ? project.projectManager
          : project.primarySponsor || "To be confirmed";
      const actionDeadline = governanceSummary.upcomingRisk?.deadline
        || (project.status === "Submitted"
          ? "Next decision board"
          : project.status === "Planning"
            ? "Next planning review"
            : "Next monthly review");
      const actionRequired = governanceSummary.upcomingRisk?.title
        || project.steeringDecisionNeeded
        || project.next30DaysPipeline
        || "Confirm the next agreed action and owner.";
      const whatsGoingWrong = governanceSummary.existingIssue
        || governanceSummary.upcomingRisk?.cause
        || project.currentPosition
        || "No live issue is currently being reported.";
      const whyItMatters = project.status === "Submitted"
        ? "A decision is needed before discovery or planning can begin."
        : overallRag === "Red"
          ? "This could delay delivery or increase cost if it is not resolved quickly."
          : overallRag === "Amber"
            ? "This needs close monitoring so it does not turn into a live delivery issue."
            : "This is currently manageable, but the next action still needs to stay on track.";
      const urgencyScore = (overallRag === "Red" ? 300 : overallRag === "Amber" ? 200 : 100)
        + (project.status === "Submitted" ? 40 : 0)
        + (project.status === "On hold" ? 50 : 0)
        + (project.currentRisk === "High" ? 35 : project.currentRisk === "Medium" ? 15 : 0)
        + Math.max(0, 100 - project.completionPercentage);

      return {
        ...project,
        decisionRequired: isDecisionRequired(project),
        currentMilestone: getRoadmapCheckpointLabel(project.roadmapPhase),
        nextMilestone: `${getRoadmapCheckpointLabel(project.roadmapPhase)} - ${formatMonthYear(project.timelineEndMonth, project.timelineYear)}`,
        governanceRag,
        governanceSummary,
        overallRag,
        actionOwner,
        actionDeadline,
        actionRequired,
        whatsGoingWrong,
        whyItMatters,
        urgencyScore
      };
    }

    function buildStakeholderReport(project) {
      const reportOwner = project.projectManager && project.projectManager !== "To be confirmed"
        ? project.projectManager
        : project.primarySponsor || "To be confirmed";
      const resourceRag = project.projectManager === "To be confirmed"
        ? "Red"
        : scoreToRag(project.projectHealthChartData?.resourcing || 3);
      const currentState = [
        ...textToBulletPoints(project.currentPosition, "Current position is still being confirmed.", 2),
        project.overallRag === "Green"
          ? "No material blocker is currently being escalated."
          : `Current watchpoint: ${project.whatsGoingWrong}`
      ].slice(0, 3);
      const riskItems = project.overallRag === "Green"
        ? [
            `No material delivery issue is being escalated at the moment. Owner: ${reportOwner}.`,
            `Next routine checkpoint: ${project.actionDeadline}.`
          ]
        : [
            `${project.whatsGoingWrong} Owner: ${project.actionOwner}.`,
            `Why it matters: ${project.whyItMatters}`,
            `Next follow-up: ${project.actionDeadline}.`
          ];
      const decisionImpact = project.decisionRequired
        ? project.whyItMatters
        : "No immediate leadership decision is being escalated for this reporting period.";

      return {
        reportOwner,
        overallRagReason: getStakeholderOverallRagReason(project),
        previousAchievements: textToBulletPoints(project.whatHappenedLastMonth, "No update was recorded for the previous period."),
        currentState,
        plannedWork: [
          ...textToBulletPoints(project.next30DaysPipeline, "The next-period plan is still being confirmed.", 2),
          project.nextMilestone
        ].slice(0, 3),
        riskItems,
        scopeResourceSchedule: [
          {
            label: "Scope",
            rag: project.governanceRag.scope,
            reason: project.governanceRag.scope === "Green"
              ? "Scope is stable for the current phase."
              : project.roadmapPhase === "discovery" || project.roadmapPhase === "definition"
                ? "Scope is still being shaped as the work moves through the current phase."
                : "Scope needs tighter control to protect delivery."
          },
          {
            label: "Resource",
            rag: resourceRag,
            reason: resourceRag === "Green"
              ? "Core delivery capacity is in place."
              : project.projectManager === "To be confirmed"
                ? "A named project manager still needs to be confirmed."
                : "Capacity needs watching through the next reporting period."
          },
          {
            label: "Schedule",
            rag: project.governanceRag.time,
            reason: project.governanceRag.time === "Green"
              ? "Timeline remains achievable against the current plan."
              : project.status === "Submitted"
                ? "Delivery has not started because approval is still needed."
                : project.status === "On hold"
                  ? "The schedule is paused until the current issue is resolved."
                  : "The next milestone needs close monitoring to stay on track."
          }
        ],
        decisionPanel: {
          decisionNeeded: project.decisionRequired ? "Yes" : "No",
          byWhen: project.decisionRequired ? project.actionDeadline : "No action due",
          summary: project.decisionRequired ? project.actionRequired : "No escalation requested",
          impact: decisionImpact
        }
      };
    }

    function GovernanceReportView({ projects }) {
      const reportProjects = projects.filter((project) => project.status !== "Draft");
      const [searchTerm, setSearchTerm] = useState("");
      const [departmentFilter, setDepartmentFilter] = useState("All departments");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");
      const [projectManagerFilter, setProjectManagerFilter] = useState("All managers");
      const [ragFilter, setRagFilter] = useState("All RAG statuses");

      const departments = [...new Set(reportProjects.map((project) => project.department).filter(Boolean))];
      const sponsors = [...new Set(reportProjects.map((project) => project.primarySponsor).filter(Boolean))];
      const projectManagers = [...new Set(reportProjects.map((project) => project.projectManager).filter(Boolean))];

      const governanceProjects = reportProjects.map(buildGovernanceProject);

      const filteredProjects = governanceProjects.filter((project) => {
        const haystack = [project.name, project.department, project.primarySponsor, project.projectManager].join(" ").toLowerCase();
        const matchesSearch = !searchTerm || haystack.includes(searchTerm.toLowerCase());
        const matchesDepartment = departmentFilter === "All departments" || project.department === departmentFilter;
        const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;
        const matchesProjectManager = projectManagerFilter === "All managers" || project.projectManager === projectManagerFilter;
        const matchesRag = ragFilter === "All RAG statuses" || project.overallRag === ragFilter;
        return matchesSearch && matchesDepartment && matchesSponsor && matchesProjectManager && matchesRag;
      });

      const summaryCounts = {
        total: filteredProjects.length,
        green: filteredProjects.filter((project) => project.overallRag === "Green").length,
        amber: filteredProjects.filter((project) => project.overallRag === "Amber").length,
        red: filteredProjects.filter((project) => project.overallRag === "Red").length
      };

      const urgentCandidates = filteredProjects.filter((project) => (
        project.overallRag !== "Green"
        || project.status === "Submitted"
        || project.status === "On hold"
      ));

      const immediateActions = (urgentCandidates.length ? urgentCandidates : filteredProjects)
        .slice()
        .sort((left, right) => right.urgencyScore - left.urgencyScore)
        .slice(0, 3);

      const clearReportFilters = () => {
        setSearchTerm("");
        setDepartmentFilter("All departments");

    function StakeholderReportView({ projects }) {
      const reportProjects = useMemo(() => projects
        .filter((project) => project.status !== "Draft")
        .map(buildGovernanceProject), [projects]);
      const [searchTerm, setSearchTerm] = useState("");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");
      const [projectManagerFilter, setProjectManagerFilter] = useState("All managers");
      const [ragFilter, setRagFilter] = useState("All RAG statuses");
      const [expandedProjectId, setExpandedProjectId] = useState("");

      const sponsors = [...new Set(reportProjects.map((project) => project.primarySponsor).filter(Boolean))];
      const projectManagers = [...new Set(reportProjects.map((project) => project.projectManager).filter(Boolean))];

      const filteredProjects = useMemo(() => reportProjects.filter((project) => {
        const haystack = [project.name, project.primarySponsor, project.projectManager, project.department].join(" ").toLowerCase();
        const matchesSearch = !searchTerm || haystack.includes(searchTerm.toLowerCase());
        const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;
        const matchesProjectManager = projectManagerFilter === "All managers" || project.projectManager === projectManagerFilter;
        const matchesRag = ragFilter === "All RAG statuses" || project.overallRag === ragFilter;
        return matchesSearch && matchesSponsor && matchesProjectManager && matchesRag;
      }), [projectManagerFilter, ragFilter, reportProjects, searchTerm, sponsorFilter]);

      useEffect(() => {
        if (!filteredProjects.length) {
          if (expandedProjectId) setExpandedProjectId("");
          return;
        }

        if (expandedProjectId && !filteredProjects.some((project) => String(project.id) === String(expandedProjectId))) {
          setExpandedProjectId("");
        }
      }, [expandedProjectId, filteredProjects]);
      const summaryCounts = {
        total: filteredProjects.length,
        green: filteredProjects.filter((project) => project.overallRag === "Green").length,
        amber: filteredProjects.filter((project) => project.overallRag === "Amber").length,
        red: filteredProjects.filter((project) => project.overallRag === "Red").length,
        decisions: filteredProjects.filter((project) => project.decisionRequired).length
      };
      const reportingPeriod = getReportingPeriodLabel();

      const clearStakeholderFilters = () => {
        setSearchTerm("");
        setSponsorFilter("All sponsors");
        setProjectManagerFilter("All managers");
        setRagFilter("All RAG statuses");
      };

      return (
        <>

              <h2 className="governance-title stakeholder-title">PMO Portfolio Summary</h2>
              <p className="section-copy">A clean summary for sponsors and senior leadership. Start with the portfolio table, then open any project for its simple stakeholder update.</p>
            </div>
            <div className="stakeholder-summary-grid">
              <article className="stakeholder-summary-card stakeholder-summary-total"><span>Total projects</span><strong>{summaryCounts.total}</strong></article>
              <article className="stakeholder-summary-card stakeholder-summary-green"><span>Green</span><strong>{summaryCounts.green}</strong></article>
              <article className="stakeholder-summary-card stakeholder-summary-amber"><span>Amber</span><strong>{summaryCounts.amber}</strong></article>
              <article className="stakeholder-summary-card stakeholder-summary-red"><span>Red</span><strong>{summaryCounts.red}</strong></article>
              <article className="stakeholder-summary-card stakeholder-summary-decision"><span>Decision needed</span><strong>{summaryCounts.decisions}</strong></article>
            </div>
          </section>

          <section className="content-panel governance-filter-panel">
            <div className="stakeholder-filter-grid">
              <div className="search-wrap governance-search">
                <input className="search-input" type="search" placeholder="Search by project, sponsor, or manager" value={searchTerm} onChange={(event) => setSearchTerm(event.target.value)} />
              </div>
              <select className="roadmap-filter-select" value={sponsorFilter} onChange={(event) => setSponsorFilter(event.target.value)}>
                <option>All sponsors</option>
                {sponsors.map((item) => <option key={item}>{item}</option>)}
              </select>
              <select className="roadmap-filter-select" value={projectManagerFilter} onChange={(event) => setProjectManagerFilter(event.target.value)}>
                <option>All managers</option>
                {projectManagers.map((item) => <option key={item}>{item}</option>)}
              </select>
              <select className="roadmap-filter-select" value={ragFilter} onChange={(event) => setRagFilter(event.target.value)}>
                <option>All RAG statuses</option>
                <option>Green</option>
                <option>Amber</option>
                <option>Red</option>
              </select>
              <button className="secondary-btn clear-filters-btn" type="button" onClick={clearStakeholderFilters}>Clear filters</button>
            </div>
          </section>

          {!reportProjects.length ? (
            <EmptyState title="There are no reportable projects yet." action="Submit a project or move a draft into the live portfolio to start seeing stakeholder reporting here." />
          ) : !filteredProjects.length ? (
            <EmptyState title="No projects match the current stakeholder filters." action="Clear one or two filters or search for a broader name to bring the portfolio summary back." />
          ) : (
            <>
              <section className="governance-section">
                <div className="governance-section-header">
                  <h3>PMO portfolio summary</h3>
                  <span>Reporting period: {reportingPeriod}</span>
                </div>

                <div className="content-panel stakeholder-summary-panel">
                  <table className="stakeholder-summary-table">
                    <thead>
                      <tr>
                        <th>Project title</th>
                        <th>Sponsor</th>
                        <th>Project manager</th>
                        <th>Overall RAG</th>
                        <th>Decision needed</th>
                        <th>Current milestone</th>
                        <th>Expand</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredProjects.map((project) => {
                        const isExpanded = String(project.id) === String(expandedProjectId);
                        const stakeholderReport = isExpanded ? buildStakeholderReport(project) : null;

                        return (
                          <React.Fragment key={`stakeholder-summary-${project.id}`}>

                            {isExpanded && stakeholderReport && (

                                  <StakeholderProjectDetail project={project} report={stakeholderReport} reportingPeriod={reportingPeriod} />

                              </tr>
                            )}
                          </React.Fragment>
                        );
                      })}

                  </table>
                </div>
              </section>
            </>

        </>
