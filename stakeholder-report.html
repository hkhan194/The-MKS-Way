<body>
  <div id="root">Loading MyMKSWay...</div>
  <script>window.MKS_PAGE = "reports"; window.MKS_REPORT_TAB = "stakeholder";</script>

  <script id="app-source" type="text/plain">
                                    const { useEffect, useMemo, useState } = React;
    const { sidebarNav, intakeOptions, documentTemplates, mockProjects, currentUser: currentUserProfile } = window.APP_CONFIG;
    const { assess, rules: scoringRules } = window.ScoringEngine;
    const draftStorageKey = "mks-intake-draft";
    const projectsStorageKey = "mks-portfolio-projects";
    const profilesStorageKey = "mks-portfolio-profiles";
    const settingsStorageKey = "mks-portfolio-settings";
    const pageKey = window.MKS_PAGE || "portfolio";
    const queryParams = new URLSearchParams(window.location.search);
    const initialPortfolioView = queryParams.get("view") === "my-projects" ? "my-projects" : "portfolio-home";

    const defaultForm = {
      projectName: "",
      projectManager: "",
      primarySponsor: "",
      strategicPillar: "",
      department: "",
      status: "",
      budgetBand: "",
      deliveryTimeline: "",
      impactedTeams: "",
      clientSensitiveData: "",
      audienceType: "",
      strategicImportance: "",
      oneLineJustification: ""
    };
    const requiredBriefFields = [
      "projectName",
      "primarySponsor",
      "strategicPillar",
      "department",
      "budgetBand",
      "deliveryTimeline",
      "impactedTeams",
      "clientSensitiveData",
      "audienceType",
      "strategicImportance",
      "oneLineJustification"
    ];
    const scoreDriverFields = new Set([
      "budgetBand",
      "deliveryTimeline",
      "impactedTeams",
      "clientSensitiveData",
      "audienceType",
      "strategicImportance"
    ]);
    const documentReviewGuidance = {
      "Project Charter": "In the Project Charter, some core sections look incomplete. Please complete the objective, scope, and sponsor case before re-uploading it.",
      "Business Case": "In the Business Case, some key sections look incomplete. Please add the costs, benefits, and justification before re-uploading it.",
      "Risk Assessment Template": "In the Risk Assessment Template, some fields look incomplete. Please complete the risks, impacts, and mitigating actions before re-uploading it.",
      "Data Privacy Assessment Form": "In the Data Privacy Assessment Form, some fields look incomplete. Please fill in the data types, lawful basis, and retention details before re-uploading it.",
      "Information Security Review Form": "In the Information Security Review Form, some fields look incomplete. Please complete the key controls, owners, and review responses before re-uploading it."
    };

    function normaliseFormValues(values) {
      return { ...defaultForm, ...(values || {}) };
    }

    function getStoredSettings() {
      try {
        const stored = window.localStorage.getItem(settingsStorageKey);
        if (!stored) {
          return {
            defaultRoadmapView: "monthly",
            showDraftProjects: true
          };
        }

        return {
          defaultRoadmapView: "monthly",
          showDraftProjects: true,
          ...JSON.parse(stored)
        };
      } catch {
        return {
          defaultRoadmapView: "monthly",
          showDraftProjects: true
        };
      }
    }

    function getFormCompletion(values) {
      const normalised = normaliseFormValues(values);
      const completedFields = requiredBriefFields.filter((field) => normalised[field]).length;
      return Math.round((completedFields / requiredBriefFields.length) * 100);
    }

    function getInitials(name) {
      return (name || "")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase() || "MK";
    }

    function getProjectSizeLabel(size) {
      const labels = {
        XS: "Extra small project",
        S: "Small project",
        M: "Medium project",
        L: "Large project",
        XL: "Very large project",
        XXL: "Programme-scale project"
      };

      return labels[size] || "Sizing in progress";
    }

    function normaliseProjectName(name) {
      return (name || "").trim().toLowerCase();
    }

    const projectMetadataOverrides = {
      "1mks client portal": {
        projectManager: "Lazo Basic",
        primarySponsor: "Lazo Basic",
        department: "MKS"
      },
      "crm optimisation": {
        projectManager: "Lazo Basic",
        primarySponsor: "Dan Martin"
      },
      "hr system upgrade": {
        projectManager: "To be confirmed",
        primarySponsor: "Victoria Ponda"
      },
      "nuthatch": {
        projectManager: "To be confirmed",
        primarySponsor: "David Painter",
        department: "Finance"
      },
      "practicepoint": {
        projectManager: "Ross Andrean",
        primarySponsor: "Lazo Basic",
        department: "IT"
      },
      "project flintstone - legal pms": {
        projectManager: "To be confirmed",
        primarySponsor: "Kate Bowen",
        department: "IT"
      },
      "refurb 12 appold street": {
        projectManager: "Simon Booth",
        primarySponsor: "Dan Martin",
        department: "Facilities"
      },
      "the mks way": {
        projectManager: "Ross Andrean",
        primarySponsor: "Dan Martin",
        department: "PMO"
      }
    };

    function getProjectMetadataOverrides(name) {
      return projectMetadataOverrides[normaliseProjectName(name)] || {};
    }

    function dedupeProjectsByName(projectList) {
      const dedupedProjects = [];

      projectList.forEach((project) => {
        const existingIndex = dedupedProjects.findIndex((candidate) => normaliseProjectName(candidate.name) === normaliseProjectName(project.name));
        if (existingIndex === -1) {
          dedupedProjects.push(project);
          return;
        }

        const existingProject = dedupedProjects[existingIndex];
        const existingPriority = existingProject.status === "Draft" ? 0 : 1;
        const incomingPriority = project.status === "Draft" ? 0 : 1;
        const existingDataWeight = (existingProject.submittedDocuments?.length || 0) + (existingProject.draftFormValues ? 1 : 0);
        const incomingDataWeight = (project.submittedDocuments?.length || 0) + (project.draftFormValues ? 1 : 0);

        if (incomingPriority > existingPriority || (incomingPriority === existingPriority && incomingDataWeight >= existingDataWeight)) {
          dedupedProjects[existingIndex] = project;
        }
      });

      return dedupedProjects;
    }

    function repairKnownSubmittedProjects(projectList) {
      return dedupeProjectsByName(projectList.map((project) => {
        if (normaliseProjectName(project.name) !== "nuthatch") {
          return project;
        }

        const fallbackDocumentList = [
          "Project Charter",
          "Business Case",
          "Risk Assessment Template",
          "Data Privacy Assessment Form",
          "Information Security Review Form"
        ];
        const repairedProject = {
          ...project,
          status: "Submitted",
          roadmapPhase: "submitted",
          completionPercentage: 0,
          currentRisk: "Submitted - pending review",
          whatHappenedLastMonth: "The project brief and supporting documents were submitted into the intake workflow.",
          currentPosition: `Submitted and waiting for PMO and ${project.department || "Finance"} leadership review before the next decision board.`,
          next30DaysPipeline: "Complete the PMO and department review, confirm whether any clarifications are needed, and take the proposal to the next decision board.",
          steeringDecisionNeeded: "A decision board outcome is needed to confirm whether the project is approved to move forward or sent back for more detail.",
          draftFormValues: null,
          submittedDocuments: project.submittedDocuments?.length
            ? project.submittedDocuments
            : (project.draftFormValues && isComplete(project.draftFormValues)
              ? buildSubmittedDocumentsFromValues(project.draftFormValues, {}, assess(project.draftFormValues), project.name).map((document) => ({
                  ...document,
                  uploadedAt: "Submitted earlier"
                }))
              : fallbackDocumentList.map((documentName) => ({
                  documentName,
                  fileName: "Uploaded Word document",
                  uploadedAt: "Submitted earlier",
                  readOnlyContent: createDocumentReadOnlyContent(documentName, {
                    projectName: project.name,
                    projectManager: project.projectManager,
                    primarySponsor: project.primarySponsor,
                    department: project.department || "Finance",
                    oneLineJustification: project.businessObjective || "Submitted project awaiting PMO and department review.",
                    deliveryTimeline: "3to6",
                    budgetBand: "25001to50000",
                    impactedTeams: "2to3",
                    clientSensitiveData: "yes",
                    audienceType: "client",
                    strategicImportance: "high"
                  }, project.name)
                })))
        };

        return repairedProject;
      }));
    }

    function getTshirtSizeHint(size) {
      const hints = {
        XS: "Small change",
        S: "Smaller project",
        M: "Medium project",
        L: "Larger piece of work",
        XL: "Large and complex",
        XXL: "Programme-scale"
      };

      return hints[size] || "Project size";
    }

    function buildScoreBreakdown(values) {
      const items = [
        { key: "strategicPriority", label: "Strategic priority", group: "strategicImportance", value: values.strategicImportance },
        { key: "budget", label: "Budget", group: "budget", value: values.budgetBand },
        { key: "timeline", label: "Timeline", group: "deliveryTimeline", value: values.deliveryTimeline },
        { key: "teams", label: "Impacted teams", group: "impactedTeams", value: values.impactedTeams },
        { key: "data", label: "Sensitive data", group: "clientSensitiveData", value: values.clientSensitiveData },
        { key: "audience", label: "Audience", group: "audienceType", value: values.audienceType }
      ];

      return items.map((item) => {
        const scoreMap = scoringRules.scores[item.group] || {};
        const max = Math.max(1, ...Object.values(scoreMap));
        const score = scoreMap[item.value] || 0;

        return {
          ...item,
          score,
          max,
          percent: Math.round((score / max) * 100)
        };
      });
    }

    function createDocumentReadOnlyContent(documentName, values, projectNameOverride = "") {
      const projectName = projectNameOverride || values.projectName || "Submitted project";
      const sponsor = values.primarySponsor || "To be confirmed";
      const manager = values.projectManager || "To be confirmed";
      const department = values.department || "To be confirmed";
      const objective = values.oneLineJustification || "No business objective was captured in the prototype record.";
      const timeline = (intakeOptions.deliveryTimeline || []).find((item) => item.value === values.deliveryTimeline)?.label || "To be confirmed";
      const budget = (intakeOptions.budgetBands || []).find((item) => item.value === values.budgetBand)?.label || "To be confirmed";
      const dataLabel = values.clientSensitiveData === "yes" ? "Yes" : values.clientSensitiveData === "no" ? "No" : "To be confirmed";
      const teamsLabel = (intakeOptions.impactedTeams || []).find((item) => item.value === values.impactedTeams)?.label || "To be confirmed";
      const audienceLabel = (intakeOptions.audienceType || []).find((item) => item.value === values.audienceType)?.label || "To be confirmed";
      const priorityLabel = (intakeOptions.strategicImportance || []).find((item) => item.value === values.strategicImportance)?.label || "To be confirmed";

      const commonIntro = `Project: ${projectName}\nSponsor: ${sponsor}\nProject manager: ${manager}\nDepartment: ${department}`;

      if (documentName === "Project Charter") {
        return `${commonIntro}\n\nSummary\n${objective}\n\nScope and delivery window\nEstimated timeline: ${timeline}\nBudget band: ${budget}\nImpacted teams: ${teamsLabel}`;
      }

      if (documentName === "Business Case") {
        return `${commonIntro}\n\nBusiness need\n${objective}\n\nWhy this matters\nStrategic priority: ${priorityLabel}\nAudience: ${audienceLabel}\nExpected delivery window: ${timeline}`;
      }

      if (documentName === "Risk Assessment Template") {
        return `${commonIntro}\n\nInitial risks captured\nSensitive data: ${dataLabel}\nImpacted teams: ${teamsLabel}\nKey watchpoint: governance, delivery, and adoption risks need to be reviewed before approval.`;
      }

      if (documentName === "Data Privacy Assessment Form") {
        return `${commonIntro}\n\nPrivacy snapshot\nSensitive data involved: ${dataLabel}\nAudience: ${audienceLabel}\nNext step: confirm data handling, access, and retention controls during review.`;
      }

      if (documentName === "Information Security Review Form") {
        return `${commonIntro}\n\nSecurity snapshot\nSensitive data involved: ${dataLabel}\nBudget band: ${budget}\nNext step: PMO and the relevant department should confirm the required control review before decision board approval.`;
      }

      return `${commonIntro}\n\nSubmitted summary\n${objective}`;
    }

    function buildSubmittedDocumentsFromValues(values, uploadedDocuments, assessment, projectNameOverride = "") {
      const uploadedAt = new Date().toLocaleDateString("en-GB");
      const requiredDocuments = assessment?.requiredDocuments || [];

      return requiredDocuments.map((documentName) => ({
        documentName,
        fileName: uploadedDocuments?.[documentName]?.name || "Uploaded Word document",
        uploadedAt,
        readOnlyContent: createDocumentReadOnlyContent(documentName, values, projectNameOverride)
      }));
    }

    function buildTriangleFromIndicators(project) {
      if (project.status === "Draft") return null;

      const base = Math.max(2, Math.min(5, Math.round((project.overallScore || 50) / 20)));
      const time = project.status === "On hold" ? Math.max(1, base - 1) : base;
      const scope = project.currentRisk === "Medium" ? Math.max(1, base - 1) : Math.min(5, base + 1);
      const budget = project.currentRisk === "Low" ? Math.min(5, base + 1) : base;

      return { time, scope, budget };
    }

    function getStoredDraftState() {
      try {
        const stored = window.localStorage.getItem(draftStorageKey);
        if (!stored) {
          return { editingDraftId: null, formValues: defaultForm };
        }

        const parsed = JSON.parse(stored);
        if (parsed && parsed.formValues) {
          return {
            editingDraftId: parsed.editingDraftId || null,
            formValues: normaliseFormValues(parsed.formValues)
          };
        }

        return {
          editingDraftId: null,
          formValues: normaliseFormValues(parsed)
        };
      } catch {
        return { editingDraftId: null, formValues: defaultForm };
      }
    }

    function isSubmittedWorkflowProject(project) {
      const workflowText = [
        project.whatHappenedLastMonth,
        project.currentPosition,
        project.next30DaysPipeline,
        project.steeringDecisionNeeded
      ].join(" ").toLowerCase();

      const hasDraftSignals = /draft saved|not yet submitted|awaiting submission/.test(workflowText);
      const hasSubmittedSignals = /submitted|decision board|pmo|waiting for review|waiting for pmo|leadership review/.test(workflowText);

      return !hasDraftSignals && (
        project.status === "Submitted"
        || project.roadmapPhase === "submitted"
        || !!project.submittedDocuments?.length
        || hasSubmittedSignals
      );
    }

    function buildFallbackSubmittedDocuments(project) {
      if (project.submittedDocuments?.length) return project.submittedDocuments;
      if (!project.draftFormValues || !isComplete(project.draftFormValues)) return project.submittedDocuments;

      const assessedProject = assess(project.draftFormValues);
      const fallbackDocuments = buildSubmittedDocumentsFromValues(project.draftFormValues, {}, assessedProject, project.name);
      if (!fallbackDocuments.length) return project.submittedDocuments;

      return fallbackDocuments.map((document) => ({
        ...document,
        uploadedAt: "Submitted earlier"
      }));
    }

    const lifecyclePhaseDefinitions = [
      {
        key: "initiation",
        label: "Initiation",
        gatewayLabel: "Gateway 1",
        readinessChecklist: [
          "Be clear on what the project is for.",
          "Make sure the sponsor agrees the project should start.",
          "Write down the first risks and assumptions."
        ],
        documents: [
          { id: "project-charter", title: "Project Charter", templateLabel: "Initiation - Project Charter.docx" },
          { id: "sponsor-brief", title: "Sponsor Brief", templateLabel: "Initiation - Sponsor Brief.docx" },
          { id: "initial-raid-log", title: "Initial RAID Log", templateLabel: "Initiation - Initial RAID Log.xlsx" }
        ]
      },
      {
        key: "planning",
        label: "Planning",
        gatewayLabel: "Gateway 2",
        readinessChecklist: [
          "Agree the plan, dates, and owners.",
          "Check key links and approvals.",
          "Get the planning files ready for review."
        ],
        documents: [
          { id: "delivery-plan", title: "Delivery Plan", templateLabel: "Planning - Delivery Plan.xlsx" },
          { id: "resource-plan", title: "Resource Plan", templateLabel: "Planning - Resource Plan.xlsx" },
          { id: "governance-pack", title: "Governance Pack", templateLabel: "Planning - Governance Pack.pptx" }
        ]
      },
      {
        key: "delivery",
        label: "Delivery",
        gatewayLabel: "Gateway 3",
        readinessChecklist: [
          "Keep the main controls up to date.",
          "Upload the key risk, change, and status files.",
          "Get the pack ready for gateway review."
        ],
        documents: [
          { id: "delivery-status-pack", title: "Delivery Status Pack", templateLabel: "Delivery - Status Pack.pptx" },
          { id: "change-log", title: "Change Log", templateLabel: "Delivery - Change Log.xlsx" },
          { id: "gate-readiness-pack", title: "Gateway Readiness Pack", templateLabel: "Delivery - Gateway Readiness Pack.docx" }
        ]
      },
      {
        key: "closure",
        label: "Closure",
        gatewayLabel: "Closure Gate",
        readinessChecklist: [
          "Finish the close-down files.",
          "Agree who will own the work after handover.",
          "Write down the lessons learned."
        ],
        documents: [
          { id: "closure-report", title: "Closure Report", templateLabel: "Closure - Closure Report.docx" },
          { id: "handover-pack", title: "Handover Pack", templateLabel: "Closure - Handover Pack.docx" },
          { id: "lessons-learned", title: "Lessons Learned", templateLabel: "Closure - Lessons Learned.docx" }
        ]
      }
    ];

    const lifecycleCurrentPhaseOverrides = {
      practicepoint: "delivery"
    };

    const lifecycleUploadedPhaseOverrides = {
      practicepoint: ["initiation", "planning", "delivery"]
    };

    function buildMockSharePointHref(fileName, projectName, sectionLabel) {
      const content = [
        "Mock SharePoint document library item",
        `File: ${fileName}`,
        `Project: ${projectName}`,
        `Section: ${sectionLabel}`,
        "",
        "This is a placeholder prototype document used to demonstrate the lifecycle governance flow."
      ].join("\n");

      return `data:text/plain;charset=utf-8,${encodeURIComponent(content)}`;
    }

    function getLifecyclePhaseLabel(phaseKey) {
      return lifecyclePhaseDefinitions.find((phase) => phase.key === phaseKey)?.label || "Lifecycle phase";
    }

    function getLifecyclePhaseIndex(phaseKey) {
      return Math.max(0, lifecyclePhaseDefinitions.findIndex((phase) => phase.key === phaseKey));
    }

    function mapProjectToLifecyclePhase(project) {
      const overridePhase = lifecycleCurrentPhaseOverrides[normaliseProjectName(project.name)];
      if (overridePhase) return overridePhase;
      if (project.status === "Completed" || project.roadmapPhase === "closure") return "closure";
      if (project.status === "Planning" || project.roadmapPhase === "definition") return "planning";
      if (project.status === "Active" && project.roadmapPhase === "delivery") return "delivery";
      if (project.roadmapPhase === "delivery") return "delivery";
      return "initiation";
    }

    function getLifecyclePhaseRelation(phaseKey, currentPhaseKey) {
      const phaseIndex = getLifecyclePhaseIndex(phaseKey);
      const currentPhaseIndex = getLifecyclePhaseIndex(currentPhaseKey);

      if (phaseIndex < currentPhaseIndex) return "historic";
      if (phaseIndex === currentPhaseIndex) return "current";
      if (phaseIndex === currentPhaseIndex + 1) return "next";
      return "future";
    }

    function isLifecycleDocumentUploaded(project, phaseKey, relation, docIndex) {
      const uploadedOverride = lifecycleUploadedPhaseOverrides[normaliseProjectName(project.name)] || [];
      if (uploadedOverride.includes(phaseKey)) return true;
      if (relation === "historic") return true;
      if (relation === "current") return docIndex === 0 && project.status !== "Submitted";
      return false;
    }

    function buildLifecycleGovernanceRecord(project) {
      const currentPhase = mapProjectToLifecyclePhase(project);

      return {
        currentPhase,
        phases: lifecyclePhaseDefinitions.map((phase) => {
          const relation = getLifecyclePhaseRelation(phase.key, currentPhase);
          return {
            key: phase.key,
            label: phase.label,
            gatewayLabel: phase.gatewayLabel,
            readinessChecklist: phase.readinessChecklist,
            documents: phase.documents.map((document, index) => {
              const uploaded = isLifecycleDocumentUploaded(project, phase.key, relation, index);
              const uploadedFileName = `${project.name} - ${document.title}.docx`;
              return {
                ...document,
                uploaded,
                uploadedAt: uploaded ? (relation === "historic" ? "Passed gateway" : "Uploaded for review") : "",
                uploadedFileName,
                templateHref: buildMockSharePointHref(document.templateLabel, project.name, `${phase.label} template`),
                uploadedHref: uploaded ? buildMockSharePointHref(uploadedFileName, project.name, `${phase.label} uploaded file`) : "",
                readOnly: relation === "historic"
              };
            })
          };
        })
      };
    }

    function hydrateProject(project) {
      const isKnownSubmittedProject = normaliseProjectName(project.name) === "nuthatch";
      const hasSubmittedDraftValues = project.status === "Draft"
        && project.draftFormValues
        && isComplete(project.draftFormValues)
        && project.draftFormValues.status === "Submitted";
      const isLegacySubmittedDraft = project.status === "Draft" && (isSubmittedWorkflowProject(project) || hasSubmittedDraftValues || isKnownSubmittedProject);
      const projectName = project.name === "Refurb 12 Apple Street" ? "Refurb 12 Appold Street" : project.name;
      const metadataOverrides = getProjectMetadataOverrides(projectName);
      const sourceProjectManager = metadataOverrides.projectManager || project.projectManager;
      const sourceSponsor = metadataOverrides.primarySponsor || project.primarySponsor;
      const sourceDepartment = metadataOverrides.department || project.department;
      const projectManager = sourceProjectManager === "Hasan Khan" ? currentUserProfile.name : sourceProjectManager;
      const createdBy = project.createdBy === "Hasan Khan" ? currentUserProfile.name : project.createdBy;
      const businessObjective = project.businessObjective?.replace("12 Apple Street", "12 Appold Street");
      const next30DaysPipeline = project.next30DaysPipeline?.replace("12 Apple Street", "12 Appold Street");
      const migratedStatus = isLegacySubmittedDraft ? "Submitted" : project.status;
      const submittedTimeline = hasSubmittedDraftValues ? getSubmittedTimeline(project.draftFormValues) : null;
      const fallbackSubmittedDocuments = (isLegacySubmittedDraft || isKnownSubmittedProject) ? buildFallbackSubmittedDocuments(project) : project.submittedDocuments;

      return {
        ...project,
        name: projectName,
        status: migratedStatus,
        projectManager,
        primarySponsor: sourceSponsor,
        department: sourceDepartment,
        createdBy: createdBy || projectManager || "",
        businessObjective,
        next30DaysPipeline,
        roadmapPhase: isLegacySubmittedDraft ? "submitted" : project.roadmapPhase,
        currentRisk: isLegacySubmittedDraft ? "Submitted - pending review" : project.currentRisk,
        currentPosition: isLegacySubmittedDraft
          ? (project.currentPosition && !/not yet submitted/i.test(project.currentPosition)
            ? project.currentPosition
            : `Submitted and waiting for PMO and ${sourceDepartment || "the relevant department"} leadership review before the next decision board.`)
          : project.currentPosition,
        whatHappenedLastMonth: isLegacySubmittedDraft
          ? (project.whatHappenedLastMonth && !/draft saved/i.test(project.whatHappenedLastMonth)
            ? project.whatHappenedLastMonth
            : "The project brief and supporting documents were submitted into the intake workflow.")
          : project.whatHappenedLastMonth,
        next30DaysPipeline: isLegacySubmittedDraft
          ? (project.next30DaysPipeline && !/complete the remaining fields/i.test(project.next30DaysPipeline)
            ? project.next30DaysPipeline
            : "Complete the PMO and department review, confirm whether any clarifications are needed, and take the proposal to the next decision board.")
          : project.next30DaysPipeline,
        steeringDecisionNeeded: isLegacySubmittedDraft
          ? (project.steeringDecisionNeeded && !/no steering decision is needed/i.test(project.steeringDecisionNeeded)
            ? project.steeringDecisionNeeded
            : "A decision board outcome is needed to confirm whether the project is approved to move forward or sent back for more detail.")
          : project.steeringDecisionNeeded,
        draftFormValues: isLegacySubmittedDraft ? null : (project.draftFormValues ? normaliseFormValues(project.draftFormValues) : null),
        submittedDocuments: fallbackSubmittedDocuments,
        timelineYear: submittedTimeline?.timelineYear || project.timelineYear,
        timelineStartMonth: submittedTimeline?.timelineStartMonth || project.timelineStartMonth,
        timelineEndMonth: submittedTimeline?.timelineEndMonth || project.timelineEndMonth,
        projectHealthTriangleData: project.projectHealthTriangleData || buildTriangleFromIndicators({ ...project, status: migratedStatus })
      };
    }

    function getStoredProjects() {
      try {
        const stored = window.localStorage.getItem(projectsStorageKey);
        if (!stored) {
          return mockProjects.map(hydrateProject);
        }

        const parsed = JSON.parse(stored);
        if (!Array.isArray(parsed)) {
          return mockProjects.map(hydrateProject);
        }

        const seededIds = new Set(mockProjects.map((project) => project.id));
        const customProjects = parsed.filter((project) => !seededIds.has(project.id));
        const hydratedProjects = [...customProjects, ...mockProjects].map(hydrateProject);
        return repairKnownSubmittedProjects(hydratedProjects);
      } catch {
        return mockProjects.map(hydrateProject);
      }

    function reviewRequiredDocuments(requiredDocuments, uploadedDocuments) {
      const messagesByDocument = {};

      requiredDocuments.forEach((doc) => {
        const file = uploadedDocuments[doc];
        const errors = [];

        if (!file) {
          errors.push(`Upload the completed ${doc} before submitting the application.`);
        } else {
          const lowerName = file.name.toLowerCase();
          if (/(template|sample|blank|draft)/.test(lowerName)) {
            errors.push(`The uploaded ${doc} still looks like a template or draft copy. Please complete it and upload the finished version.`);
          }
          if (file.size < 12000) {
            errors.push(documentReviewGuidance[doc] || `Please add more complete information to ${doc} and upload the updated version.`);
          }
        }

        if (errors.length) {
          messagesByDocument[doc] = errors;
        }
      });

      return {
        hasIssues: Object.keys(messagesByDocument).length > 0,
        messagesByDocument
      };
    }

    function RadarChart({ data }) {
      const axes = [
        ["Governance", data.governance],
        ["Sponsor Engagement", data.sponsorEngagement],
        ["Scope", data.scope],
        ["Budget", data.budget],
        ["Schedule", data.schedule],
        ["Resourcing", data.resourcing],
        ["Risk & Issues", data.riskIssues],
        ["Quality", data.quality]
      ];
      const size = 320;
      const center = size / 2;
      const maxRadius = 108;
      const levels = [1, 2, 3, 4, 5];

      const pointFor = (value, index, radiusMultiplier = 1) => {
        const angle = ((Math.PI * 2) / axes.length) * index - Math.PI / 2;
        const radius = (value / 5) * maxRadius * radiusMultiplier;
        return [center + Math.cos(angle) * radius, center + Math.sin(angle) * radius];
      };

      const polygonPoints = axes.map(([, value], index) => pointFor(value, index).join(",")).join(" ");

      return (
        <div className="radar-chart-wrap">
          <svg viewBox={`0 0 ${size} ${size}`} className="radar-chart" role="img" aria-label="Project health radar chart">
            {levels.map((level) => {
              const points = axes.map((_, index) => pointFor(level, index, 1).join(",")).join(" ");
              return <polygon key={level} points={points} className="radar-grid" />;
            })}
            {axes.map(([label], index) => {
              const [x, y] = pointFor(5, index, 1.1);
              return (
                <g key={label}>
                  <line x1={center} y1={center} x2={pointFor(5, index)[0]} y2={pointFor(5, index)[1]} className="radar-axis" />
                  <text x={x} y={y} className="radar-label" textAnchor={x < center - 8 ? "end" : x > center + 8 ? "start" : "middle"}>{label}</text>
                </g>
              );
            })}
            <polygon points={polygonPoints} className="radar-shape" />
            {axes.map(([label, value], index) => {
              const [x, y] = pointFor(value, index);
              return <circle key={`${label}-${value}`} cx={x} cy={y} r="4" className={`radar-point radar-point-${value}`} />;
            })}
          </svg>
          <p className="radar-scale-note">The closer the shape is to the outside, the healthier that area is right now.</p>
          <div className="radar-scale" aria-label="Project health legend">
            <span className="radar-legend-item"><span className="radar-legend-dot radar-legend-dot-watch" aria-hidden="true"></span>Needs support</span>
            <span className="radar-legend-item"><span className="radar-legend-dot radar-legend-dot-track" aria-hidden="true"></span>Needs watching</span>
            <span className="radar-legend-item"><span className="radar-legend-dot radar-legend-dot-strong" aria-hidden="true"></span>In a healthy place</span>
          </div>
        </div>
      );
    }

    function TriangleChart({ data }) {
      const axes = [
        ["Time", data.time],
        ["Scope", data.scope],
        ["Budget", data.budget]
      ];
      const size = 260;
      const center = size / 2;
      const maxRadius = 82;
      const levels = [1, 2, 3, 4, 5];

      const pointFor = (value, index) => {
        const angle = ((Math.PI * 2) / axes.length) * index - Math.PI / 2;
        const radius = (value / 5) * maxRadius;
        return [center + Math.cos(angle) * radius, center + Math.sin(angle) * radius];
      };

      return (
        <div className="triangle-chart-wrap">
          <svg viewBox={`0 0 ${size} ${size}`} className="triangle-chart" role="img" aria-label="Project golden triangle chart">
            {levels.map((level) => {
              const points = axes.map((_, index) => pointFor(level, index).join(",")).join(" ");
              return <polygon key={level} points={points} className="triangle-grid" />;
            })}
            {axes.map(([label], index) => {
              const [x, y] = pointFor(5, index);
              return (
                <g key={label}>
                  <line x1={center} y1={center} x2={pointFor(5, index)[0]} y2={pointFor(5, index)[1]} className="triangle-axis" />
                  <text x={x} y={y} className="triangle-label" textAnchor="middle">{label}</text>
                </g>
              );
            })}
            <polygon points={axes.map(([, value], index) => pointFor(value, index).join(",")).join(" ")} className="triangle-shape" />
          </svg>
          <p className="triangle-note">A quick balance check across delivery time, scope control, and budget position.</p>
        </div>
      );
    }

    function LifecycleGovernanceModal({ project, onClose }) {
      const [lifecycleRecord, setLifecycleRecord] = useState(null);
      const [activePhase, setActivePhase] = useState("initiation");

      useEffect(() => {
        if (!project) {
          setLifecycleRecord(null);
          setActivePhase("initiation");
          return;
        }

        const record = buildLifecycleGovernanceRecord(project);
        setLifecycleRecord(record);
        setActivePhase(record.currentPhase);
      }, [project]);

      if (!project || !lifecycleRecord) {
        return <Modal isOpen={false} onClose={onClose} titleId="lifecycleGovernanceTitle" />;
      }

      const currentPhaseIndex = getLifecyclePhaseIndex(lifecycleRecord.currentPhase);
      const activePhaseRecord = lifecycleRecord.phases.find((phase) => phase.key === activePhase) || lifecycleRecord.phases[0];
      const activeRelation = getLifecyclePhaseRelation(activePhaseRecord.key, lifecycleRecord.currentPhase);
      const activeUploadedCount = activePhaseRecord.documents.filter((document) => document.uploaded).length;
      const nextPhaseRecord = lifecycleRecord.phases.find((phase) => getLifecyclePhaseRelation(phase.key, lifecycleRecord.currentPhase) === "next") || null;

      const getPhaseGuidance = (relation) => {
        if (relation === "historic") {
          return {
            heading: "Stage complete",
            copy: "This stage is done. You can still open the files, but you cannot change them."

        }

        if (relation === "current") {
          return {
            heading: `${activePhaseRecord.label} stage`,
            copy: "This is the stage the project is in now."
          };
        }

        if (relation === "next") {
          return {
            heading: `${activePhaseRecord.label} stage`,
            copy: "This stage is next. You can start getting ready now."
          };
        }

        return {
          heading: `${activePhaseRecord.label} stage`,
          copy: "This stage comes later."
        };
      };

      const getReadinessState = (phase) => {
        const relation = getLifecyclePhaseRelation(phase.key, lifecycleRecord.currentPhase);
        const uploadedCount = phase.documents.filter((document) => document.uploaded).length;
        const requiredCount = phase.documents.length;

        if (relation === "historic") {
          return {
            label: "Gateway done",
            tone: "done",
            copy: "This gateway is finished."
          };
        }

        if (relation === "current") {
          return uploadedCount === requiredCount
            ? {
                label: "Ready for review",
                tone: "ready",
                copy: "All the needed files are in place."
              }
            : {
                label: `${uploadedCount} of ${requiredCount} files ready`,
                tone: "working",
                copy: "Finish the missing files before review."
              };
        }

        if (relation === "next") {
          return {
            label: "Next stage",
            tone: "next",
            copy: "You can start these files early."
          };
        }

        return {
          label: "Later stage",
          tone: "future",
          copy: "Nothing to do here yet."
        };
      };

      const mockUploadDocument = (phaseKey, documentId) => {
        setLifecycleRecord((current) => ({
          ...current,
          phases: current.phases.map((phase) => {
            if (phase.key !== phaseKey) return phase;

            return {
              ...phase,
              documents: phase.documents.map((document) => (
                document.id !== documentId
                  ? document
                  : {
                      ...document,
                      uploaded: true,
                      uploadedAt: "Mock upload complete",
                      uploadedHref: buildMockSharePointHref(`${project.name} - ${document.title}.docx`, project.name, `${phase.label} uploaded file`)
                    }
              ))
            };
          })
        }));
      };

      const activeReadiness = getReadinessState(activePhaseRecord);

                <h2 id="lifecycleGovernanceTitle" className="detail-title">{project.name} lifecycle</h2>

              </div>
              <button className="icon-btn" type="button" aria-label="Close lifecycle governance" onClick={onClose}><Icon icon="close" className="icon-only-svg" /></button>

            <section className="detail-card lifecycle-journey-card">

                <div className="section-title-row">

                </div>
                <span className={`status-pill ${getStatusClass(getLifecyclePhaseLabel(lifecycleRecord.currentPhase))}`}>Current phase: {getLifecyclePhaseLabel(lifecycleRecord.currentPhase)}</span>
              </div>

              <div className="lifecycle-journey">
                {lifecyclePhaseDefinitions.map((phase, index) => {
                  const relation = getLifecyclePhaseRelation(phase.key, lifecycleRecord.currentPhase);

                  const isActiveTab = phase.key === activePhase;

                  return (
                    <React.Fragment key={`journey-${phase.key}`}>
                      <button
                        className={`lifecycle-stage lifecycle-stage-${relation} ${isActiveTab ? "lifecycle-stage-active" : ""}`}

                      >
                        <span className="lifecycle-stage-number">{index + 1}</span>

                        <span>{isCurrent ? "Now" : relation === "historic" ? "Done" : relation === "next" ? "Next" : "Later"}</span>

                      {index < lifecyclePhaseDefinitions.length - 1 && (

            <section className="detail-card">

                      {activeRelation === "current" && activeUploadedCount !== activePhaseRecord.documents.length && <li>Next step: finish the missing files.</li>}
                      {activeRelation === "historic" && <li>Next step: nothing to do here.</li>}
                      {activeRelation === "next" && <li>Next step: start these files early.</li>}
                    </ul>
                  </section>

                  <section className="lifecycle-side-card">
                    <p className="section-title">What comes next</p>
                    <p className="section-copy">
                      {nextPhaseRecord

                    </p>
                    <ul className="lifecycle-checklist">

                  </section>
                </div>

                <section className="lifecycle-document-panel">
                  <div className="section-header-row">
                    <div className="section-title-row">
                      <p className="section-title">Required documents</p>
                    </div>
                  </div>

                  <div className="lifecycle-document-grid">
                    {activePhaseRecord.documents.map((document) => {
                      const canMockUpload = !document.uploaded && (activeRelation === "current" || activeRelation === "next");

                      return (
                        <article className="lifecycle-document-card" key={`${activePhaseRecord.key}-${document.id}`}>

                              <p className="section-title">{document.title}</p>

                          <div className="lifecycle-document-links">

                              <a className="doc-link" href={document.templateHref} download={document.templateLabel}>{document.templateLabel}</a>

                                <a className="doc-link" href={document.uploadedHref} download={document.uploadedFileName}>{document.uploadedFileName}</a>
