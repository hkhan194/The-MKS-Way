      const [statusFilter, setStatusFilter] = useState("All statuses");
      const [departmentFilter, setDepartmentFilter] = useState("All departments");
      const [pmFilter, setPmFilter] = useState("All PMs");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");
      const [roadmapScale, setRoadmapScale] = useState(storedSettings.defaultRoadmapView);
      const [showDraftProjects, setShowDraftProjects] = useState(storedSettings.showDraftProjects);
      const [sortConfig, setSortConfig] = useState({ key: "name", direction: "asc" });
      const [draftMessage, setDraftMessage] = useState("");
      const [uploadedDocuments, setUploadedDocuments] = useState({});
      const [submissionReview, setSubmissionReview] = useState(null);
      const [showBackToTop, setShowBackToTop] = useState(false);
      const [isIntakeExitPromptOpen, setIsIntakeExitPromptOpen] = useState(false);

      useEffect(() => {
        if (!isNavOpen) return undefined;
        const onKeyDown = (event) => {
          if (event.key === "Escape") setIsNavOpen(false);
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [isNavOpen]);

      useEffect(() => {
        window.localStorage.setItem(projectsStorageKey, JSON.stringify(projects));
      }, [projects]);

      useEffect(() => {
        setProjects((current) => repairKnownSubmittedProjects(current.map(hydrateProject)));
      }, []);

      useEffect(() => {
        if (!selectedProject) return;
        const refreshedProject = projects.find((project) => project.id === selectedProject.id)
          || projects.find((project) => normaliseProjectName(project.name) === normaliseProjectName(selectedProject.name));
        if (refreshedProject && refreshedProject !== selectedProject) {
          setSelectedProject(refreshedProject);
        }
      }, [projects, selectedProject]);

      useEffect(() => {
        if (!selectedLifecycleProject) return;
        const refreshedProject = projects.find((project) => project.id === selectedLifecycleProject.id)
          || projects.find((project) => normaliseProjectName(project.name) === normaliseProjectName(selectedLifecycleProject.name));
        if (refreshedProject && refreshedProject !== selectedLifecycleProject) {
          setSelectedLifecycleProject(refreshedProject);
        }
      }, [projects, selectedLifecycleProject]);

      useEffect(() => {
        window.localStorage.setItem(profilesStorageKey, JSON.stringify(profiles));
      }, [profiles]);

      useEffect(() => {
        window.localStorage.setItem(settingsStorageKey, JSON.stringify({
          defaultRoadmapView: roadmapScale,
          showDraftProjects
        }));
      }, [roadmapScale, showDraftProjects]);

      useEffect(() => {
        if (editingDraftId || Object.values(formValues).some(Boolean)) {
          window.localStorage.setItem(draftStorageKey, JSON.stringify({
            editingDraftId,
            formValues
          }));
          return;
        }

        window.localStorage.removeItem(draftStorageKey);
      }, [editingDraftId, formValues]);

      useEffect(() => {
        const onScroll = () => setShowBackToTop(window.scrollY > 280);
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      const assessment = useMemo(() => (isComplete(formValues) ? assess(formValues) : null), [formValues]);
      const intakeProgress = useMemo(() => getFormCompletion(formValues), [formValues]);
      const scoreBreakdown = useMemo(() => buildScoreBreakdown(formValues), [formValues]);
      const liveScore = scoreBreakdown.reduce((total, item) => total + item.score, 0);
      const displayedScore = assessment ? assessment.score : liveScore;
      const displayedScoreOutOf = assessment ? assessment.scoreOutOf : 100;
      const displayedProjectSize = assessment ? getProjectSizeLabel(assessment.tshirtSize) : "Sizing in progress";
      const hasUnsavedIntakeChanges = editingDraftId || Object.values(formValues).some(Boolean) || Object.keys(uploadedDocuments).length > 0;
      const avatarInitials = getInitials(currentUserProfile.name);

      const updatePreference = (key, value) => {
        if (key === "defaultRoadmapView") {
          setRoadmapScale(value);
          return;
        }

        if (key === "showDraftProjects") {
          setShowDraftProjects(value);
        }
      };

      const canViewProject = (project) => project.status !== "Draft" || currentUserProfile.isAdmin || project.createdBy === currentUserProfile.name;
      const isAssignedToCurrentUser = (project) => [project.projectManager, project.primarySponsor, project.createdBy].includes(currentUserProfile.name);
      const canResumeProject = (project) => project.status === "Draft" && !isSubmittedWorkflowProject(project) && (currentUserProfile.isAdmin || project.createdBy === currentUserProfile.name);

      const accessibleProjects = useMemo(() => projects.filter((project) => canViewProject(project)), [projects]);

      const filteredProjects = useMemo(() => accessibleProjects.filter((project) => {
        const haystack = [project.name, project.department, project.projectManager, project.primarySponsor, project.strategicPillar].join(" ").toLowerCase();
        const matchesSearch = !search || haystack.includes(search.toLowerCase());
        const matchesStatus = statusFilter === "All statuses" || getLifecycleDisplayStatus(project).label === statusFilter;
        const matchesDepartment = departmentFilter === "All departments" || project.department === departmentFilter;
        const matchesPm = pmFilter === "All PMs" || project.projectManager === pmFilter;
        const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;
        const matchesView = activeNavKey !== "my-projects" || isAssignedToCurrentUser(project);
        return matchesSearch && matchesStatus && matchesDepartment && matchesPm && matchesSponsor && matchesView;
      }), [accessibleProjects, activeNavKey, search, statusFilter, departmentFilter, pmFilter, sponsorFilter]);

      const portfolioVisibleProjects = useMemo(() => filteredProjects.filter((project) => showDraftProjects || project.status !== "Draft"), [filteredProjects, showDraftProjects]);

      const sortedProjects = useMemo(() => {
        const getSortValue = (project, key) => {
          if (key === "completionPercentage") return project.completionPercentage;
          if (key === "status") return getLifecycleDisplayStatus(project).label.toLowerCase();
          if (key === "tshirtSize") return project.tshirtSize;
          return `${project[key] || ""}`.toLowerCase();
        };

        return [...portfolioVisibleProjects].sort((left, right) => {
          const leftValue = getSortValue(left, sortConfig.key);
          const rightValue = getSortValue(right, sortConfig.key);

          if (leftValue === rightValue) return 0;
          const comparison = leftValue > rightValue ? 1 : -1;
          return sortConfig.direction === "asc" ? comparison : comparison * -1;
        });
      }, [portfolioVisibleProjects, sortConfig]);

      const departments = [...new Set(accessibleProjects.map((project) => project.department))];
      const managers = [...new Set(accessibleProjects.map((project) => project.projectManager))];
      const sponsors = [...new Set(accessibleProjects.map((project) => project.primarySponsor))];
      const portfolioStatuses = [...new Set(accessibleProjects.map((project) => getLifecycleDisplayStatus(project).label))];
      const reportProjects = accessibleProjects.filter((project) => project.status !== "Draft");
      const isPortfolioPage = pageKey === "portfolio";
      const isRoadmapView = pageKey === "roadmap";
      const isReportsView = pageKey === "reports";
      const isSettingsView = pageKey === "settings";
      const isHelpView = pageKey === "help";
      const isMyProjectsView = isPortfolioPage && activeNavKey === "my-projects";
      const pageTitle = isRoadmapView
        ? "Roadmap"
        : isReportsView
          ? "Reports"
          : isSettingsView
            ? "Settings"
            : isHelpView
              ? "Help"
              : isMyProjectsView
                ? "My projects"
                : "Project portfolio";
      const pageSectionTitle = isMyProjectsView ? "My Projects" : "Portfolio Home";
      const pageSectionCopy = isMyProjectsView
        ? "Projects where you are the manager, sponsor, or draft owner."
        : "All visible projects across the portfolio.";
      const portfolioIntro = "This is where all MKS projects live. Browse the portfolio, track progress, and submit new projects.";
      const pageCountBadge = isRoadmapView
        ? `${reportProjects.length} roadmap projects`
        : isReportsView
          ? `${reportProjects.length} reportable projects`
          : isHelpView
            ? "4 guidance sections"
          : isSettingsView
            ? `${Object.keys(documentTemplates).length} template controls`
            : `${portfolioVisibleProjects.length} projects`;
      const currentProfile = selectedPersonName
        ? {
            firstName: selectedPersonName.split(" ")[0] || selectedPersonName,
            fullName: selectedPersonName,
            title: selectedPersonName === currentUserProfile.name ? currentUserProfile.roleLabel : "Portfolio contributor",
            department: projects.find((project) => project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName)?.department || "Portfolio",
            ...(profiles[selectedPersonName] || {})
          }
        : null;
      const currentProfileStats = selectedPersonName ? {
        projectsAsManager: projects.filter((project) => project.projectManager === selectedPersonName).length,
        projectsAsSponsor: projects.filter((project) => project.primarySponsor === selectedPersonName).length,
        activeProjects: projects.filter((project) => (project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName) && project.status !== "Completed").length,
        hitRate: Math.round(((projects.filter((project) => project.projectManager === selectedPersonName && project.status === "Completed").length || 0) / Math.max(1, projects.filter((project) => project.projectManager === selectedPersonName).length)) * 100),
        managerActivity: Math.min(98, 55 + (projects.filter((project) => project.projectManager === selectedPersonName).length * 7)),
        actionUpdateRate: profiles[selectedPersonName]?.actionUpdateRate || Math.min(96, 60 + (projects.filter((project) => project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName).length * 5))
      } : null;
      const columnDefinitions = [
        { key: "name", label: "Project name" },
        { key: "status", label: "Status" },
        { key: "projectManager", label: "Manager" },
        { key: "primarySponsor", label: "Sponsor" },
        { key: "department", label: "Department" },
        { key: "tshirtSize", label: "Size" },
        { key: "completionPercentage", label: "Completion" }
      ];

      const onChange = (event) => {
        const { name, value } = event.target;
        setDraftMessage("");
        setSubmissionReview(null);
        setFormValues((current) => ({ ...current, [name]: value }));
      };

      const onDocumentUpload = (doc, files) => {
        const file = files && files[0] ? files[0] : null;
        setSubmissionReview(null);
        setUploadedDocuments((current) => ({
          ...current,
          [doc]: file
        }));
      };

      const toggleSort = (key) => {
        setSortConfig((current) => {
          if (current.key === key) {
            return { key, direction: current.direction === "asc" ? "desc" : "asc" };
          }

          return { key, direction: "asc" };
        });
      };

      const saveDraft = () => {
        if (!formValues.projectName) {
          setDraftMessage("Add at least a project name before saving a draft.");
          return;
        }

        const savedAssessment = isComplete(formValues) ? assess(formValues) : null;
        const budgetLabel = intakeOptions.budgetBands.find((item) => item.value === formValues.budgetBand)?.label || "To be confirmed";
        const draftId = editingDraftId || `draft-${Date.now()}`;
        const draftProject = {
          id: draftId,
          name: formValues.projectName || "Untitled draft",
          status: "Draft",
          tshirtSize: savedAssessment ? savedAssessment.tshirtSize : "TBC",
          completionPercentage: getFormCompletion(formValues),
          projectManager: formValues.projectManager || "To be confirmed",
          primarySponsor: formValues.primarySponsor || "To be confirmed",
          department: formValues.department || "To be confirmed",
          projectType: formValues.audienceType === "client" ? "Client-facing initiative" : formValues.audienceType === "internal" ? "Internal initiative" : "Draft project",
          strategicPillar: formValues.strategicPillar || "To be confirmed",
          budget: budgetLabel,
          overallScore: savedAssessment ? savedAssessment.score : 0,
          currentRisk: "Draft - awaiting submission",
          whatHappenedLastMonth: "Draft saved and ready to be completed.",
          currentPosition: "The intake form has been started but not yet submitted.",
          next30DaysPipeline: "Complete the remaining fields, upload the required documents, and submit the application.",
          steeringDecisionNeeded: "No steering decision is needed until the draft has been completed and submitted.",
          businessObjective: formValues.oneLineJustification || "Business objective still being captured.",
          projectHealthChartData: buildRadarDefaults(savedAssessment ? savedAssessment.score : 20),
          projectHealthTriangleData: null,
          healthCheckReportUrl: "",
          createdBy: editingDraftId
            ? projects.find((project) => project.id === editingDraftId)?.createdBy || currentUserProfile.name
            : currentUserProfile.name,
          draftFormValues: normaliseFormValues(formValues)
        };

        setProjects((current) => [draftProject, ...current.filter((project) => project.id !== draftProject.id)]);
        setEditingDraftId(draftId);
        setSubmissionReview(null);
        setDraftMessage("Draft saved. Use Resume form completion to pick up where you left off.");
      };

      const clearFilters = () => {
        setSearch("");
        setStatusFilter("All statuses");
        setDepartmentFilter("All departments");
        setPmFilter("All PMs");
        setSponsorFilter("All sponsors");
      };

      const buildRadarDefaults = (score) => {
        const base = Math.max(1, Math.min(5, Math.round(score / 20)));
        return {
          governance: base,
          sponsorEngagement: Math.min(5, base + 1),
          scope: base,
          budget: base,
          schedule: Math.max(1, base - 1),
          resourcing: Math.max(1, base - 1),
          riskIssues: base,
          quality: Math.min(5, base + 1)
        };
      };

      const resetDraftState = () => {
        setEditingDraftId(null);
        setFormValues(defaultForm);
        setDraftMessage("");
      };

      const resetIntakeFeedback = () => {
        setUploadedDocuments({});
        setSubmissionReview(null);
      };

      const closeIntakeModal = () => {
        if (submissionReview?.type === "success") {
          setIsIntakeOpen(false);
          setSubmissionReview(null);
          setIsIntakeExitPromptOpen(false);
          return;
        }

        if (hasUnsavedIntakeChanges) {
          setIsIntakeExitPromptOpen(true);
          return;
        }

        setIsIntakeOpen(false);
        setSubmissionReview(null);
        setIsIntakeExitPromptOpen(false);
      };

      const discardIntakeAndClose = () => {
        setIsIntakeExitPromptOpen(false);
        setIsIntakeOpen(false);
        resetDraftState();
        resetIntakeFeedback();
        setDraftMessage("");
      };

      const saveDraftAndClose = () => {
        saveDraft();
        if (formValues.projectName) {
          setIsIntakeExitPromptOpen(false);
          setIsIntakeOpen(false);
        }
      };

      const startNewProject = () => {
        setSelectedProject(null);
        resetDraftState();
        resetIntakeFeedback();
        setIsIntakeOpen(true);
      };

      const resumeDraftProject = (project) => {
        const storedDraftState = getStoredDraftState();
        const budgetBand = intakeOptions.budgetBands.find((item) => item.label === project.budget)?.value || "";
        const fallbackValues = project.draftFormValues || normaliseFormValues({
          projectName: project.name,
          projectManager: project.projectManager,
          primarySponsor: project.primarySponsor,
          strategicPillar: project.strategicPillar,
          department: project.department !== "To be confirmed" ? project.department : "",
          budgetBand,
          deliveryTimeline: "",
          impactedTeams: "",
          clientSensitiveData: "",
          audienceType: project.projectType === "Client-facing initiative" ? "client" : project.projectType === "Internal initiative" ? "internal" : "",
          strategicImportance: "",
          oneLineJustification: project.businessObjective !== "Business objective still being captured." ? project.businessObjective : ""
        });
        const resumeValues = storedDraftState.editingDraftId === project.id ? storedDraftState.formValues : fallbackValues;

        setEditingDraftId(project.id);
        setFormValues(resumeValues);
        resetIntakeFeedback();
        setDraftMessage(`Resumed draft for ${project.name}.`);
        setSelectedProject(null);
        setIsIntakeOpen(true);
      };

      const saveProjectEdits = (projectId, updates) => {
        setProjects((current) => current.map((project) => project.id === projectId ? hydrateProject({ ...project, ...updates }) : project));
        setSelectedProject((current) => current && current.id === projectId ? hydrateProject({ ...current, ...updates }) : current);
      };

      const openProfile = (personName) => setSelectedPersonName(personName);
      const saveProfile = (personName, values) => {
        setProfiles((current) => ({
          ...current,
          [personName]: {
            ...current[personName],
            ...values
          }
        }));
      };

      const submitProject = (event) => {
        event.preventDefault();
        if (!assessment) {
          event.currentTarget.reportValidity();
          return;
        }

        const requiredDocuments = assessment.requiredDocuments || [];
        const documentReview = reviewRequiredDocuments(requiredDocuments, uploadedDocuments);
        if (documentReview.hasIssues) {
          setSubmissionReview({
            type: "error",
            title: "A few documents still need more detail",
            message: "Please update the highlighted documents, upload the revised versions, and then resubmit the application.",
            messagesByDocument: documentReview.messagesByDocument
          });
          return;
        }

        const budgetLabel = intakeOptions.budgetBands.find((item) => item.value === formValues.budgetBand)?.label || "";
        const projectId = editingDraftId || `project-${Date.now()}`;
        const existingDraft = projects.find((project) => project.id === editingDraftId);
        const submittedStatus = "Submitted";
        const submittedTimeline = getSubmittedTimeline(formValues);
        const uploadedAt = new Date().toLocaleDateString("en-GB");
        const submittedDocuments = buildSubmittedDocumentsFromValues(formValues, uploadedDocuments, assessment, formValues.projectName).map((document) => ({
          ...document,
          uploadedAt
        }));
        const project = {
          id: projectId,
          name: formValues.projectName,
          status: submittedStatus,
          tshirtSize: assessment.tshirtSize,
          completionPercentage: 0,
          projectManager: formValues.projectManager || "To be confirmed",
          primarySponsor: formValues.primarySponsor,
          department: formValues.department,
          projectType: formValues.audienceType === "client" ? "Client-facing initiative" : "Internal initiative",
          strategicPillar: formValues.strategicPillar,
          budget: budgetLabel,
          overallScore: assessment.score,
          currentRisk: "Submitted - pending review",
          roadmapPhase: "submitted",
          currentPhaseProgress: 0,
          whatHappenedLastMonth: "The project brief and supporting documents were submitted into the intake workflow.",
          currentPosition: `Submitted and waiting for PMO and ${formValues.department} leadership review before the next decision board.`,
          next30DaysPipeline: "Complete the PMO and department review, confirm whether any clarifications are needed, and take the proposal to the next decision board.",
          steeringDecisionNeeded: "A decision board outcome is needed to confirm whether the project is approved to move forward or sent back for more detail.",
          businessObjective: formValues.oneLineJustification,
          projectHealthChartData: buildRadarDefaults(assessment.score),
          projectHealthTriangleData: buildTriangleFromIndicators({
            overallScore: assessment.score,
            status: submittedStatus,
            currentRisk: "Submitted - pending review"
          }),
          healthCheckReportUrl: "",
          createdBy: existingDraft?.createdBy || currentUserProfile.name,
          draftFormValues: null,
          submittedDocuments,
          ...submittedTimeline
        };

        setProjects((current) => [
          project,
          ...current.filter((item) => (
            item.id !== project.id
            && !(item.status === "Draft" && normaliseProjectName(item.name) === normaliseProjectName(project.name))
          ))
        ]);
        resetDraftState();
        setUploadedDocuments({});
        setSubmissionReview({
          type: "success",
          title: "Thank you. Your project brief has been submitted.",
          message: `This has been sent to the PMO and the head of ${formValues.department}. They will review it and it will be discussed at the next project decision board.`
        });
      };

      const openProject = (project) => setSelectedProject(project);
      const openLifecycleProject = (project) => setSelectedLifecycleProject(project);

      const onProjectRowKeyDown = (event, project) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openProject(project);
        }
      };

      return (
        <>
          <div className={`app-shell ${isNavOpen ? "nav-open" : ""}`}>
            <div className={`sidebar-overlay ${isNavOpen ? "show" : ""}`} onClick={() => setIsNavOpen(false)}></div>
            <aside className="sidebar">
              <div className="brand-block">
                <button className="sidebar-close-btn" type="button" aria-label="Close menu" onClick={() => setIsNavOpen(false)}>
                  <Icon icon="close" className="icon-only-svg" />
                </button>
                <div className="logo-row">
                  <img className="brand-logo" src="assets/mks-logo.svg" alt="Moore Kingston Smith logo" />
                  <div className="logo-text">
                    <strong>MOORE</strong>
                    <span>Kingston Smith</span>
                  </div>
                </div>
                <p className="brand-tag">Realising ambitions, together</p>
                <p className="brand-product">The MKS Way</p>
              </div>

              <div className="nav-section">
                <p className="nav-heading">Navigation</p>
                <nav className="nav">
                  {sidebarNav.map((item) => (
                    <a key={item.key} className={`nav-link ${activeNavKey === item.key ? "active" : ""}`} href={getNavHref(item.key)} onClick={() => setIsNavOpen(false)}>
                      <Icon icon={item.icon} />
                      {item.label}
                    </a>
                  ))}
                </nav>
              </div>

              <div className="sidebar-footer">
                {isPortfolioPage ? (
                  <button className="user-card user-profile-btn" type="button" onClick={() => openProfile(currentUserProfile.name)}>
                    <div className="avatar">{avatarInitials}</div>
                    <div className="user-meta">
                      <strong>{currentUserProfile.name}</strong>
                      <span>{currentUserProfile.roleLabel}</span>
                    </div>
                  </button>
                ) : (
                  <a className="user-card user-profile-btn" href="index.html">
                    <div className="avatar">{avatarInitials}</div>
                    <div className="user-meta">
                      <strong>{currentUserProfile.name}</strong>
                      <span>Profile on portfolio home</span>
                    </div>
                  </a>
                )}
              </div>
            </aside>

            <main className="main-content">
              <header className="topbar">
                <div className="topbar-left">
                  <button className="hamburger-btn" type="button" aria-label="Open menu" onClick={() => setIsNavOpen(true)}><Icon icon="menu" className="icon-only-svg" /></button>
                  <div className="topbar-brand">
                    <img className="topbar-logo" src="assets/mks-logo.svg" alt="Moore Kingston Smith logo" />
                    <span>Moore Kingston Smith</span>
                  </div>
                  <div className="topbar-title">
                    <h1>{pageTitle}</h1>
                    <span className="count-badge">{pageCountBadge}</span>
                  </div>
                </div>
                <button className="primary-btn" type="button" onClick={startNewProject}>+ New project</button>
              </header>

                <div className="content-area">
                  {isRoadmapView ? (
                    <RoadmapView projects={accessibleProjects} scale={roadmapScale} onScaleChange={setRoadmapScale} />
                ) : isReportsView ? (
                  <ReportsView projects={accessibleProjects} />
                ) : isSettingsView ? (
                  <SettingsView
                    projects={accessibleProjects}
                    preferences={{ defaultRoadmapView: roadmapScale, showDraftProjects }}
                    onUpdatePreference={updatePreference}
                  />
                ) : isHelpView ? (
                  <HelpView />
                ) : (
                  <>
                    <section className="stat-grid">
                      <article className="stat-card stat-navy"><div className="stat-chip"></div><p className="stat-label">Total projects</p><p className="stat-value">{filteredProjects.length}</p><div className="stat-subtext">Everything in the visible portfolio</div></article>
                      <article className="stat-card stat-blue"><div className="stat-chip"></div><p className="stat-label">In lifecycle</p><p className="stat-value">{filteredProjects.filter((p) => ["Initiation", "Planning", "Delivery"].includes(getLifecycleDisplayStatus(p).label)).length}</p><div className="stat-subtext">Currently moving through the lifecycle</div></article>
                      <article className="stat-card stat-orange"><div className="stat-chip"></div><p className="stat-label">On hold</p><p className="stat-value">{filteredProjects.filter((p) => p.status === "On hold").length}</p><div className="stat-subtext">Paused for now</div></article>
                      <article className="stat-card stat-green"><div className="stat-chip"></div><p className="stat-label">Closure</p><p className="stat-value">{filteredProjects.filter((p) => getLifecycleDisplayStatus(p).label === "Closure").length}</p><div className="stat-subtext">Finished and signed off</div></article>
                    </section>

                    <section className="toolbar">
                      <div className="search-wrap"><input className="search-input" type="search" placeholder="Search projects..." value={search} onChange={(event) => setSearch(event.target.value)} /></div>
                      <select value={statusFilter} onChange={(event) => setStatusFilter(event.target.value)}><option>All statuses</option>{portfolioStatuses.map((status) => <option key={status}>{status}</option>)}</select>
                      <select value={departmentFilter} onChange={(event) => setDepartmentFilter(event.target.value)}><option>All departments</option>{departments.map((department) => <option key={department}>{department}</option>)}</select>
                      <select value={pmFilter} onChange={(event) => setPmFilter(event.target.value)}><option>All PMs</option>{managers.map((manager) => <option key={manager}>{manager}</option>)}</select>
                      <select value={sponsorFilter} onChange={(event) => setSponsorFilter(event.target.value)}><option>All sponsors</option>{sponsors.map((sponsor) => <option key={sponsor}>{sponsor}</option>)}</select>
                      <button className="secondary-btn clear-filters-btn" type="button" onClick={clearFilters}>Clear filters</button>
                    </section>

                    <section className="content-panel">
                      <div className="section-header portfolio-section-header">
                        <div>
                          <p className="section-title">Project list</p>
                          <p className="section-copy">Use Details for the normal project update view, or Lifecycle for the separate governance and gateway view.</p>
                        </div>
                      </div>
                      <div className="portfolio-table-wrap">
                        <table className="portfolio-table">
                          <thead>
                            <tr>
                              {columnDefinitions.map((column) => (
                                <th key={column.key}>
                                  <div className="table-header-cell">
                                    <button className="table-header-btn" type="button" onClick={() => toggleSort(column.key)}>
                                      <span>{column.label}</span>
                                      {sortConfig.key === column.key && <span className="sort-state">{sortConfig.direction === "asc" ? "Asc" : "Desc"}</span>}
                                      <Icon icon="sort" className="table-sort-svg" />
                                    </button>
                                  </div>
                                </th>
                              ))}
                            </tr>
                          </thead>
                            <tbody>
                              {sortedProjects.map((project) => {
                                const displayStatus = getLifecycleDisplayStatus(project);

                                return (
                                  <tr key={project.id} className="clickable-row" tabIndex={0} onClick={() => openProject(project)} onKeyDown={(event) => onProjectRowKeyDown(event, project)}>
                                    <td>
                                      <div className="project-main-row">
                                        <div className="project-main">{project.name}</div>
                                        <div className="project-entry-actions">
                                          <button className="project-entry-btn" type="button" onClick={(event) => { event.stopPropagation(); openProject(project); }}>Details</button>
                                          <button className="project-entry-btn project-entry-btn-lifecycle" type="button" onClick={(event) => { event.stopPropagation(); openLifecycleProject(project); }}>Lifecycle</button>
                                        </div>
                                      </div>
                                      <div className="project-sub">{project.projectType} · Phase: {displayStatus.label}</div>
                                    </td>
                                    <td><span className={`status-pill ${getStatusClass(displayStatus.label)}`}>{displayStatus.label}</span></td>
                                    <td><button className="profile-link table-profile-link" type="button" onClick={(event) => { event.stopPropagation(); openProfile(project.projectManager); }}>{project.projectManager}</button></td>
                                    <td><button className="profile-link table-profile-link" type="button" onClick={(event) => { event.stopPropagation(); openProfile(project.primarySponsor); }}>{project.primarySponsor}</button></td>
                                    <td>{project.department}</td>
                                    <td><div className="size-cell"><span className="size-badge">{project.tshirtSize}</span><span className="size-caption">{getTshirtSizeHint(project.tshirtSize)}</span></div></td>
                                    <td><div className="progress-wrap"><div className="progress-track"><div className={`progress-bar ${getProgressClass(displayStatus.label)}`} style={{ width: `${project.completionPercentage}%` }}></div></div><span className="progress-value">{project.completionPercentage}%</span></div></td>
                                  </tr>
                                );
                              })}
                          </tbody>
                        </table>
                      </div>
                      {!sortedProjects.length && <EmptyState title="No projects match this view right now." action="Clear the filters, show draft projects again in Settings, or start a new project to add one." />}
                    </section>
                  </>
                )}
              </div>
            </main>
          </div>

          <Modal isOpen={isIntakeOpen} onClose={closeIntakeModal} titleId="projectIntakeTitle">
            <div className="modal-header">
              <div>
                <p className="eyebrow">{editingDraftId ? "Resume project brief" : "New project brief"}</p>
                <h3 id="projectIntakeTitle">{editingDraftId ? "Resume project brief" : "New project brief"}</h3>
                <p className="project-brief-copy">Fields marked * are required to unlock submission.</p>
              </div>
              <button className="icon-btn" type="button" aria-label="Close intake form" onClick={closeIntakeModal}><Icon icon="close" className="icon-only-svg" /></button>
            </div>

            {submissionReview?.type === "success" ? (
              <div className="submission-review-panel submission-review-success">
                <p className="eyebrow">Submission complete</p>
                <h4>{submissionReview.title}</h4>
                <p>{submissionReview.message}</p>
                <div className="form-actions">
                  <button className="primary-btn" type="button" onClick={closeIntakeModal}>Close</button>
                </div>
              </div>
            ) : (
            <form className="project-form" onSubmit={submitProject}>
              <section className="form-progress-card">
                <div className="form-progress-header">
                  <strong>Brief completion</strong>
                  <span>{intakeProgress}%</span>
                </div>
                <div className="form-progress-track">
                  <div className="form-progress-fill" style={{ width: `${intakeProgress}%` }}></div>
                </div>
              </section>

              <div className="form-grid">
                <label>
                  <FormFieldLabel title="Project Name" required />
                  <input type="text" name="projectName" value={formValues.projectName} onChange={onChange} required placeholder="Use a short, clear name people will recognise later" />
                </label>
                <label>
                  <FormFieldLabel title="Primary Sponsor" required />
                  <input type="text" name="primarySponsor" value={formValues.primarySponsor} onChange={onChange} required placeholder="Add the sponsor who is backing this project" />
                </label>
                <label>
                  <FormFieldLabel title="Strategic Pillar" required />
                  <select className={!formValues.strategicPillar ? "is-placeholder" : ""} name="strategicPillar" value={formValues.strategicPillar} onChange={onChange} required><option value="" disabled hidden>Choose the firm priority this work supports most</option>{intakeOptions.strategicPillars.map((item) => <option key={item} value={item}>{item}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Department" required />
                  <select className={!formValues.department ? "is-placeholder" : ""} name="department" value={formValues.department} onChange={onChange} required><option value="" disabled hidden>Choose the main area that owns or benefits from the project</option>{intakeOptions.departments.map((item) => <option key={item} value={item}>{item}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Estimated Budget" required driver />
                  <select className={!formValues.budgetBand ? "is-placeholder" : ""} name="budgetBand" value={formValues.budgetBand} onChange={onChange} required><option value="" disabled hidden>Pick the closest budget range for the expected spend</option>{intakeOptions.budgetBands.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Delivery Timeline" required driver />
                  <select className={!formValues.deliveryTimeline ? "is-placeholder" : ""} name="deliveryTimeline" value={formValues.deliveryTimeline} onChange={onChange} required><option value="" disabled hidden>Choose how long you think delivery is likely to take</option>{intakeOptions.deliveryTimeline.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Impacted Teams" required driver />
                  <select className={!formValues.impactedTeams ? "is-placeholder" : ""} name="impactedTeams" value={formValues.impactedTeams} onChange={onChange} required><option value="" disabled hidden>Tell us how many teams will be affected by the change</option>{intakeOptions.impactedTeams.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Client Sensitive Data" required driver />
                  <select className={!formValues.clientSensitiveData ? "is-placeholder" : ""} name="clientSensitiveData" value={formValues.clientSensitiveData} onChange={onChange} required><option value="" disabled hidden>Choose yes if the work will use client or personal data</option><option value="no">No</option><option value="yes">Yes</option></select>
                </label>
                <label>
                  <FormFieldLabel title="Audience Type" required driver />
                  <select className={!formValues.audienceType ? "is-placeholder" : ""} name="audienceType" value={formValues.audienceType} onChange={onChange} required><option value="" disabled hidden>Choose whether the outcome is internal, client-facing, or both</option>{intakeOptions.audienceType.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select>
                </label>
                <label>
                  <FormFieldLabel title="Strategic Priority" required driver />
                  <select className={!formValues.strategicImportance ? "is-placeholder" : ""} name="strategicImportance" value={formValues.strategicImportance} onChange={onChange} required><option value="" disabled hidden>Choose how important this project is to the firm right now</option>{intakeOptions.strategicImportance.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select>
                </label>
              </div>

              <label className="full-width"><FormFieldLabel title="One-line Justification" required /><textarea name="oneLineJustification" rows="3" value={formValues.oneLineJustification} onChange={onChange} required placeholder="Summarise the business objective and the outcome you expect"></textarea></label>

              {assessment && <section className="intake-score-panel">
                <div className="intake-score-header">
                  <div>
                    <p className="eyebrow">Project size and overall score</p>
                    <p className="intake-score-copy">Based on budget, timeline, sensitive data, impacted teams, audience, and strategic priority for {formValues.strategicPillar || "the selected strategic pillar"}.</p>
                  </div>
                  <span className="project-size-pill">{displayedProjectSize}</span>
                </div>

                <div className="intake-score-breakdown">
                  {scoreBreakdown.map((item) => (
                    <div className="intake-score-row" key={item.key}>
                      <span>{item.label}</span>
                      <div className="intake-score-line">
                        <div className="intake-score-line-fill" style={{ width: `${item.percent}%` }}></div>
                      </div>
                      <strong>{item.score}</strong>
                    </div>
                  ))}
                </div>

                <div className="intake-score-footer">
                  <span>Overall score</span>
                  <strong>{displayedScore}/{displayedScoreOutOf}</strong>
                </div>

                <p className="intake-score-note"><strong>What does this score mean?</strong> {assessment ? assessment.explanation : "Keep filling the required fields to lock the final score and routing."}</p>
              </section>}

              {assessment && <section className="guidance-panel">
                <div><p className="eyebrow">Required Documents</p><h4>Download, complete, and attach each required document</h4></div>
                <div className="document-grid">
                  {(assessment ? assessment.requiredDocuments : []).map((doc) => (
                    <div className="document-item" key={doc}>
                      <div className="document-summary">
                        <div className="document-icon-badge"><Icon icon="doc" className="document-icon-svg" /></div>
                        <div className="document-meta">
                          <strong>{doc}</strong>
                          <span className="document-template-type">Microsoft Word template (.docx)</span>
                          <span className="document-template-note">{documentTemplates[doc]?.note || "Required for this route."}</span>
                        </div>
                      </div>
                      <div className="document-actions">
                        <a className="doc-link" href={documentTemplates[doc]?.file} download>Download sample</a>
                        <input className="file-input" type="file" aria-label={`Attach ${doc}`} accept=".doc,.docx" onChange={(event) => onDocumentUpload(doc, event.target.files)} />
                      </div>
                      {uploadedDocuments[doc] && <p className="document-uploaded-note">{uploadedDocuments[doc].name}</p>}
                      {submissionReview?.type === "error" && submissionReview.messagesByDocument?.[doc] && (
                        <div className="document-review-errors">
                          {submissionReview.messagesByDocument[doc].map((message, index) => <p key={`${doc}-review-${index}`}>{message}</p>)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </section>}

              {submissionReview?.type === "error" && (
                <div className="submission-review-panel">
                  <strong>{submissionReview.title}</strong>
                  <span>{submissionReview.message}</span>
                </div>
              )}

              {draftMessage && <p className="form-note">{draftMessage}</p>}

              <div className="form-actions">
                <button className="secondary-btn" type="button" onClick={saveDraft}>{editingDraftId ? "Update draft" : "Save draft"}</button>
                <button className="primary-btn" type="submit">Submit application</button>
              </div>
            </form>
            )}
          </Modal>

          <Modal isOpen={isIntakeExitPromptOpen} onClose={() => setIsIntakeExitPromptOpen(false)} titleId="intakeExitPromptTitle">
            <div className="detail-modal">
              <div className="detail-header">
                <div>
                  <p className="eyebrow">Close project brief</p>
                  <h3 id="intakeExitPromptTitle">Save before you close?</h3>
                </div>
                <button className="icon-btn" type="button" aria-label="Close save prompt" onClick={() => setIsIntakeExitPromptOpen(false)}><Icon icon="close" className="icon-only-svg" /></button>
              </div>
              <div className="submission-review-panel submission-review-neutral">
                <p>You have started filling in this project brief.</p>
                <p>Do you want to save it as a draft before closing?</p>
              </div>
              <div className="form-actions">
                <button className="secondary-btn" type="button" onClick={() => setIsIntakeExitPromptOpen(false)}>Keep editing</button>
                <button className="secondary-btn" type="button" onClick={discardIntakeAndClose}>Close without saving</button>
                <button className="primary-btn" type="button" onClick={saveDraftAndClose}>Save draft and close</button>
              </div>
            </div>
          </Modal>

          {isPortfolioPage && <ProjectDetailModal project={selectedProject} onClose={() => setSelectedProject(null)} canResumeDraft={selectedProject ? canResumeProject(selectedProject) : false} onResumeDraft={resumeDraftProject} canEditProject={currentUserProfile.isAdmin} onSaveProjectEdits={saveProjectEdits} onOpenProfile={openProfile} />}
          {isPortfolioPage && <LifecycleGovernanceModal project={selectedLifecycleProject} onClose={() => setSelectedLifecycleProject(null)} />}
          {isPortfolioPage && <ProfileModal personName={selectedPersonName} profile={currentProfile} stats={currentProfileStats} onClose={() => setSelectedPersonName("")} onSave={saveProfile} />}
          {showBackToTop && <button className="back-to-top-btn" type="button" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>Back to top</button>}
        </>
      );
    }

    window.addEventListener("error", (event) => {
      const root = document.getElementById("root");
      if (!root) return;
      root.innerHTML = `<div style="padding:24px;font-family:Arial,sans-serif;color:#8a1c1c;background:#fff7f7;border:1px solid #f0c2c2;border-radius:12px;margin:24px;"><strong>Startup error</strong><pre style="white-space:pre-wrap;margin-top:12px;">${String(event.error || event.message || "Unknown error")}</pre></div>`;
    });

    try {
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    } catch (error) {
      const root = document.getElementById("root");
      if (root) {
        root.innerHTML = `<div style="padding:24px;font-family:Arial,sans-serif;color:#8a1c1c;background:#fff7f7;border:1px solid #f0c2c2;border-radius:12px;margin:24px;"><strong>Startup error</strong><pre style="white-space:pre-wrap;margin-top:12px;">${String(error && (error.stack || error.message) || error)}</pre></div>`;
      }
      throw error;
    }
  


  


  


  


  


  


  


  


  


  </script>
  <script>
    (function () {
      const root = document.getElementById('root');
      const showError = (error) => {
        const detail = error && (error.stack || error.message || error.reason || error.toString()) || 'Unknown startup error';
        root.innerHTML = '<div style="padding:24px;font-family:Arial,sans-serif;color:#8a1c1c;background:#fff7f7;border:1px solid #f0c2c2;border-radius:12px;"><strong>Startup error</strong><pre style="white-space:pre-wrap;margin-top:12px;">' + String(detail).replace(/</g,'&lt;') + '</pre></div>';
      };
      window.addEventListener('error', function (event) { showError(event.error || event.message); });
      window.addEventListener('unhandledrejection', function (event) { showError(event.reason || 'Unhandled promise rejection'); });
      try {
        const source = document.getElementById('app-source').textContent;
        const transformed = Babel.transform(source, { presets: ['react'] }).code;
        const script = document.createElement('script');
        script.text = transformed;
        document.body.appendChild(script);
      } catch (error) {
        showError(error);
      }
    })();
  </script>
</body>
</html>
