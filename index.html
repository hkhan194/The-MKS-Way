<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyMKSWay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useMemo, useState } = React;

    const initialProjects = [
      { id: 1, projectName: "OneMKS", projectTitle: "Client Services", status: "Draft", projectManager: "Lazo Basic", primarySponsor: "Dan Martine", department: "Client Services", score: 22, size: "Medium", completion: 0 },
      { id: 2, projectName: "iManage", projectTitle: "IT", status: "Active", projectManager: "Hassan Khan", primarySponsor: "Lazo Basic", department: "IT", score: 86, size: "Large", completion: 65 },
      { id: 3, projectName: "Project Flintstone - Legal PMS", projectTitle: "Legal", status: "Active", projectManager: "Hassan Khan", primarySponsor: "Lazo Basic", department: "Legal", score: 82, size: "Large", completion: 40 },
      { id: 4, projectName: "CRM Optimisation", projectTitle: "Client Services", status: "Active", projectManager: "Hassan Khan", primarySponsor: "Lazo Basic", department: "Client Services", score: 68, size: "Medium", completion: 80 },
      { id: 5, projectName: "myMKSway PMO build", projectTitle: "IT", status: "Planning", projectManager: "Hassan Khan", primarySponsor: "Lazo Basic", department: "IT", score: 74, size: "Large", completion: 15 },
      { id: 6, projectName: "HR System Upgrade", projectTitle: "HR", status: "Completed", projectManager: "Robin Taylor", primarySponsor: "Sarah Kent", department: "HR", score: 46, size: "Small", completion: 100 },
      { id: 7, projectName: "Finance Reporting v2", projectTitle: "Finance", status: "On hold", projectManager: "Sam Lowe", primarySponsor: "Mark Davies", department: "Finance", score: 58, size: "Medium", completion: 30 },
    ];

    const defaultForm = {
      projectName: "",
      projectTitle: "",
      projectManager: "",
      primarySponsor: "",
      department: "",
      status: "",
      budgetBand: "",
      timeline: "",
      teamImpact: "",
      sensitiveData: "",
      brief: "",
    };

    function calculateOutcome(values) {
      let score = 20;

      if (values.budgetBand === "medium") score += 15;
      if (values.budgetBand === "high") score += 30;
      if (values.timeline === "medium") score += 10;
      if (values.timeline === "long") score += 20;
      if (values.teamImpact === "multi") score += 15;
      if (values.teamImpact === "enterprise") score += 25;
      if (values.sensitiveData === "yes") score += 20;
      if (values.department === "Technology") score += 10;
      if (values.department === "Operations") score += 6;

      let size = "Small";
      if (score >= 50 && score < 80) size = "Medium";
      if (score >= 80) size = "Large";

      let route = "Fast-track review";
      if (size === "Medium") route = "Standard governance review";
      if (size === "Large") route = "Full governance board review";

      const documents = ["Simple project brief", "Business case template"];

      if (score >= 50) {
        documents.push("Risk assessment template", "Governance review checklist");
      }

      if (values.sensitiveData === "yes") {
        documents.push("Data/privacy checklist", "Information security review form");
      }

      if (size === "Large") {
        documents.push("Detailed delivery plan", "Benefits tracking template");
      }

      return { score, size, route, documents };
    }

    function isComplete(values) {
      return Object.values(values).every(Boolean);
    }

    function getStatusClass(status) {
      if (status === "Draft") return "status-draft";
      if (status === "Active") return "status-active";
      if (status === "Planning") return "status-planning";
      if (status === "Completed") return "status-completed";
      return "status-onhold";
    }

    function getProgressClass(status) {
      if (status === "Active" || status === "Completed") return "progress-green";
      if (status === "Planning" || status === "On hold") return "progress-orange";
      return "progress-blue";
    }

    function App() {
      const [projects, setProjects] = useState(initialProjects);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [formValues, setFormValues] = useState(defaultForm);
      const [search, setSearch] = useState("");
      const [statusFilter, setStatusFilter] = useState("All statuses");
      const [departmentFilter, setDepartmentFilter] = useState("All departments");
      const [pmFilter, setPmFilter] = useState("All PMs");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");

      const outcome = useMemo(() => {
        if (!isComplete(formValues)) {
          return null;
        }

        return calculateOutcome(formValues);
      }, [formValues]);

      const filteredProjects = useMemo(() => {
        return projects.filter((project) => {
          const matchesSearch =
            !search ||
            project.projectName.toLowerCase().includes(search.toLowerCase()) ||
            project.projectTitle.toLowerCase().includes(search.toLowerCase()) ||
            project.department.toLowerCase().includes(search.toLowerCase()) ||
            project.projectManager.toLowerCase().includes(search.toLowerCase()) ||
            project.primarySponsor.toLowerCase().includes(search.toLowerCase());

          const matchesStatus = statusFilter === "All statuses" || project.status === statusFilter;
          const matchesDepartment = departmentFilter === "All departments" || project.department === departmentFilter;
          const matchesPm = pmFilter === "All PMs" || project.projectManager === pmFilter;
          const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;

          return matchesSearch && matchesStatus && matchesDepartment && matchesPm && matchesSponsor;
        });
      }, [projects, search, statusFilter, departmentFilter, pmFilter, sponsorFilter]);

      const totalProjects = filteredProjects.length;
      const activeProjects = filteredProjects.filter((project) => project.status === "Active").length;
      const onHoldProjects = filteredProjects.filter((project) => project.status === "On hold").length;
      const completedProjects = filteredProjects.filter((project) => project.status === "Completed").length;
      const departments = [...new Set(projects.map((project) => project.department))];
      const projectManagers = [...new Set(projects.map((project) => project.projectManager))];
      const sponsors = [...new Set(projects.map((project) => project.primarySponsor))];

      const onChange = (event) => {
        const { name, value } = event.target;
        setFormValues((current) => ({
          ...current,
          [name]: value,
        }));
      };

      const onSubmit = (event) => {
        event.preventDefault();

        if (!isComplete(formValues)) {
          event.currentTarget.reportValidity();
          return;
        }

        const nextOutcome = calculateOutcome(formValues);
        const newProject = {
          id: Date.now(),
          projectName: formValues.projectName,
          projectTitle: formValues.projectTitle,
          status: formValues.status === "Submitted" ? "Planning" : formValues.status,
          projectManager: formValues.projectManager,
          primarySponsor: formValues.primarySponsor,
          department: formValues.department,
          score: nextOutcome.score,
          size: nextOutcome.size,
          completion: 0,
        };

        setProjects((current) => [newProject, ...current]);
        setFormValues(defaultForm);
        setIsModalOpen(false);
      };

      return (
        <>
          <div className="app-shell">
            <aside className="sidebar">
              <div className="brand-block">
                <div className="logo-row">
                  <div className="logo-mark"></div>
                  <div className="logo-text">
                    <strong>MOORE</strong>
                    <span>Kingston Smith</span>
                  </div>
                </div>
                <p className="brand-tag">Realising ambitions, together</p>
                <p className="brand-product">The MKS Way</p>
              </div>

              <div className="nav-section">
                <p className="nav-heading">Navigation</p>
                <nav className="nav">
                  <button className="nav-link active" type="button"><span className="nav-icon"></span>Portfolio home</button>
                  <button className="nav-link" type="button"><span className="nav-icon"></span>All projects</button>
                  <button className="nav-link" type="button"><span className="nav-icon"></span>My projects</button>
                  <button className="nav-link" type="button"><span className="nav-icon"></span>Roadmap</button>
                  <button className="nav-link" type="button"><span className="nav-icon"></span>Reports</button>
                </nav>
              </div>

              <div className="sidebar-footer">
                <div className="settings-link"><span className="nav-icon"></span>Settings</div>
                <div className="user-card">
                  <div className="avatar">HK</div>
                  <div className="user-meta">
                    <strong>Hassan Khan</strong>
                    <span>Project Manager</span>
                  </div>
                </div>
              </div>
            </aside>

            <main className="main-content">
              <header className="topbar">
                <div className="topbar-title">
                  <h1>Project portfolio</h1>
                  <span className="count-badge">{filteredProjects.length} projects</span>
                </div>
                <button className="primary-btn" type="button" onClick={() => setIsModalOpen(true)}>
                  + New project
                </button>
              </header>

              <div className="content-area">
                <section className="stat-grid">
                  <article className="stat-card">
                    <p className="stat-label">Total projects</p>
                    <p className="stat-value">{totalProjects}</p>
                    <div className="stat-subtext">All departments</div>
                  </article>
                  <article className="stat-card green">
                    <p className="stat-label">Active</p>
                    <p className="stat-value">{activeProjects}</p>
                    <div className="stat-subtext">In delivery</div>
                  </article>
                  <article className="stat-card orange">
                    <p className="stat-label">On hold</p>
                    <p className="stat-value">{onHoldProjects}</p>
                    <div className="stat-subtext">Paused</div>
                  </article>
                  <article className="stat-card grey">
                    <p className="stat-label">Completed</p>
                    <p className="stat-value">{completedProjects}</p>
                    <div className="stat-subtext">Closed out</div>
                  </article>
                </section>

                <section className="toolbar">
                  <div className="search-wrap">
                    <input className="search-input" type="search" placeholder="Search projects..." value={search} onChange={(event) => setSearch(event.target.value)} />
                  </div>
                  <select value={statusFilter} onChange={(event) => setStatusFilter(event.target.value)}>
                    <option>All statuses</option>
                    <option>Draft</option>
                    <option>Active</option>
                    <option>Planning</option>
                    <option>Completed</option>
                    <option>On hold</option>
                  </select>
                  <select value={departmentFilter} onChange={(event) => setDepartmentFilter(event.target.value)}>
                    <option>All departments</option>
                    {departments.map((department) => <option key={department}>{department}</option>)}
                  </select>
                  <select value={pmFilter} onChange={(event) => setPmFilter(event.target.value)}>
                    <option>All PMs</option>
                    {projectManagers.map((manager) => <option key={manager}>{manager}</option>)}
                  </select>
                  <select value={sponsorFilter} onChange={(event) => setSponsorFilter(event.target.value)}>
                    <option>All sponsors</option>
                    {sponsors.map((sponsor) => <option key={sponsor}>{sponsor}</option>)}
                  </select>
                </section>

                <section>
                  <p className="section-title">All projects</p>
                  <div className="portfolio-table-wrap">
                  <table className="portfolio-table">
                    <thead>
                      <tr>
                        <th>Project Name</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Manager</th>
                        <th>Sponsor</th>
                        <th>Department</th>
                        <th>Size</th>
                        <th>Completion</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredProjects.map((project) => (
                        <tr key={project.id}>
                          <td>
                            <div className="project-main">{project.projectName}</div>
                            <div className="project-sub">{project.projectTitle}</div>
                          </td>
                          <td>{project.projectTitle}</td>
                          <td><span className={`status-pill ${getStatusClass(project.status)}`}>{project.status}</span></td>
                          <td>{project.projectManager}</td>
                          <td>{project.primarySponsor}</td>
                          <td>{project.department}</td>
                          <td><span className="size-badge">{project.size}</span></td>
                          <td>
                            <div className="progress-wrap">
                              <div className="progress-track">
                                <div className={`progress-bar ${getProgressClass(project.status)}`} style={{ width: `${project.completion}%` }}></div>
                              </div>
                              <span className="progress-value">{project.completion}%</span>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="project-cards show">
                  {filteredProjects.map((project) => (
                    <article className="project-card" key={`card-${project.id}`}>
                      <div className="project-card-top">
                        <div>
                          <p className="project-name">{project.projectTitle}</p>
                          <h4 className="project-title">{project.projectName}</h4>
                        </div>
                        <span className={`status-pill ${getStatusClass(project.status)}`}>{project.status}</span>
                      </div>
                      <dl>
                        <div>
                          <dt>Project Manager</dt>
                          <dd>{project.projectManager}</dd>
                        </div>
                        <div>
                          <dt>Primary Sponsor</dt>
                          <dd>{project.primarySponsor}</dd>
                        </div>
                        <div>
                          <dt>Department</dt>
                          <dd>{project.department}</dd>
                        </div>
                        <div>
                          <dt>Size</dt>
                          <dd>{project.size}</dd>
                        </div>
                        <div>
                          <dt>Completion</dt>
                          <dd>{project.completion}%</dd>
                        </div>
                      </dl>
                    </article>
                  ))}
                </div>
                </section>
              </div>
            </main>
          </div>

          <div className={`modal ${isModalOpen ? "show" : "hidden"}`} aria-hidden={!isModalOpen}>
            <div className="modal-backdrop" onClick={() => setIsModalOpen(false)}></div>
            <div className="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
              <div className="modal-header">
                <div>
                  <p className="eyebrow">New project</p>
                  <h3 id="modalTitle">Project Brief</h3>
                </div>
                <button className="icon-btn" type="button" aria-label="Close form" onClick={() => setIsModalOpen(false)}>
                  ×
                </button>
              </div>

              <form className="project-form" onSubmit={onSubmit}>
                <div className="form-grid">
                  <label>
                    <span>Project Name *</span>
                    <input type="text" name="projectName" value={formValues.projectName} onChange={onChange} required />
                  </label>
                  <label>
                    <span>Project Title *</span>
                    <input type="text" name="projectTitle" value={formValues.projectTitle} onChange={onChange} required />
                  </label>
                  <label>
                    <span>Project Manager *</span>
                    <input type="text" name="projectManager" value={formValues.projectManager} onChange={onChange} required />
                  </label>
                  <label>
                    <span>Primary Sponsor *</span>
                    <input type="text" name="primarySponsor" value={formValues.primarySponsor} onChange={onChange} required />
                  </label>
                  <label>
                    <span>Department *</span>
                    <select name="department" value={formValues.department} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="Technology">Technology</option>
                      <option value="IT">IT</option>
                      <option value="Finance">Finance</option>
                      <option value="Operations">Operations</option>
                      <option value="Legal">Legal</option>
                      <option value="HR">HR</option>
                      <option value="Client Services">Client Services</option>
                      <option value="People">People</option>
                      <option value="Marketing">Marketing</option>
                    </select>
                  </label>
                  <label>
                    <span>Status *</span>
                    <select name="status" value={formValues.status} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="Draft">Draft</option>
                      <option value="Submitted">Submitted</option>
                      <option value="Active">Active</option>
                      <option value="On hold">On hold</option>
                    </select>
                  </label>
                  <label>
                    <span>Estimated Budget *</span>
                    <select name="budgetBand" value={formValues.budgetBand} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="low">Under £25k</option>
                      <option value="medium">£25k - £100k</option>
                      <option value="high">Over £100k</option>
                    </select>
                  </label>
                  <label>
                    <span>Delivery Timeline *</span>
                    <select name="timeline" value={formValues.timeline} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="short">0-3 months</option>
                      <option value="medium">3-6 months</option>
                      <option value="long">6+ months</option>
                    </select>
                  </label>
                  <label>
                    <span>Impacted Teams *</span>
                    <select name="teamImpact" value={formValues.teamImpact} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="single">Single team</option>
                      <option value="multi">Multiple teams</option>
                      <option value="enterprise">Firm-wide</option>
                    </select>
                  </label>
                  <label>
                    <span>Contains Client or Sensitive Data? *</span>
                    <select name="sensitiveData" value={formValues.sensitiveData} onChange={onChange} required>
                      <option value="">Select</option>
                      <option value="no">No</option>
                      <option value="yes">Yes</option>
                    </select>
                  </label>
                </div>

                <label className="full-width">
                  <span>Simple Project Brief *</span>
                  <textarea
                    name="brief"
                    rows="4"
                    value={formValues.brief}
                    onChange={onChange}
                    required
                    placeholder="Describe the problem, expected outcome, and why this project matters."
                  ></textarea>
                </label>

                <section className="guidance-panel">
                  <div>
                    <p className="eyebrow">Dynamic next steps</p>
                    <h4>Required documents and guidance</h4>
                  </div>
                  <ul className="next-steps-list">
                    {(outcome ? outcome.documents : ["Complete the mandatory fields to see the required documents."]).map((doc) => (
                      <li key={doc}>{doc}</li>
                    ))}
                  </ul>
                </section>

                <section className="template-panel">
                  <p className="eyebrow">Future SharePoint path</p>
                  <h4>What happens after submit</h4>
                  <ul className="template-list">
                    <li>Create a project record in SharePoint.</li>
                    <li>Create a project folder for all related documents.</li>
                    <li>Show the templates the user needs to complete.</li>
                    <li>Let users upload the finished Word documents and submit.</li>
                  </ul>
                </section>

                <section className="score-panel">
                  <div className="score-card">
                    <span>Project score</span>
                    <strong>{outcome ? outcome.score : "-"}</strong>
                  </div>
                  <div className="score-card">
                    <span>T-shirt size</span>
                    <strong>{outcome ? outcome.size : "-"}</strong>
                  </div>
                  <div className="score-card">
                    <span>Recommended route</span>
                    <strong>{outcome ? outcome.route : "Complete the form"}</strong>
                  </div>
                </section>

                <p className="form-note">
                  This screen is rendered by React inside a single HTML file so it is easier to open directly.
                </p>

                <div className="form-actions">
                  <button className="secondary-btn" type="button" onClick={() => setFormValues(defaultForm)}>
                    Clear Form
                  </button>
                  <button className="primary-btn" type="submit">Submit Project</button>
                </div>
              </form>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
