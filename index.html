    function App() {
      const storedDraftState = getStoredDraftState();
      const [projects, setProjects] = useState(getStoredProjects);
      const [profiles, setProfiles] = useState(getStoredProfiles);
      const [isIntakeOpen, setIsIntakeOpen] = useState(false);
      const [selectedProject, setSelectedProject] = useState(null);
      const [selectedPersonName, setSelectedPersonName] = useState("");
      const [isNavOpen, setIsNavOpen] = useState(false);
      const [activeNavKey] = useState(pageKey === "portfolio" ? initialPortfolioView : pageKey);
      const [editingDraftId, setEditingDraftId] = useState(storedDraftState.editingDraftId);
      const [formValues, setFormValues] = useState(storedDraftState.formValues);
      const [search, setSearch] = useState("");
      const [statusFilter, setStatusFilter] = useState("All statuses");
      const [departmentFilter, setDepartmentFilter] = useState("All departments");
      const [pmFilter, setPmFilter] = useState("All PMs");
      const [sponsorFilter, setSponsorFilter] = useState("All sponsors");
      const [roadmapScale, setRoadmapScale] = useState("monthly");
      const [sortConfig, setSortConfig] = useState({ key: "name", direction: "asc" });
      const [draftMessage, setDraftMessage] = useState("");

      useEffect(() => {
        if (!isNavOpen) return undefined;
        const onKeyDown = (event) => {
          if (event.key === "Escape") setIsNavOpen(false);
        };
        window.addEventListener("keydown", onKeyDown);
        return () => window.removeEventListener("keydown", onKeyDown);
      }, [isNavOpen]);

      useEffect(() => {
        window.localStorage.setItem(projectsStorageKey, JSON.stringify(projects));
      }, [projects]);

      useEffect(() => {
        window.localStorage.setItem(profilesStorageKey, JSON.stringify(profiles));
      }, [profiles]);

      useEffect(() => {
        if (editingDraftId || Object.values(formValues).some(Boolean)) {
          window.localStorage.setItem(draftStorageKey, JSON.stringify({
            editingDraftId,
            formValues
          }));
          return;
        }

        window.localStorage.removeItem(draftStorageKey);
      }, [editingDraftId, formValues]);

      const assessment = useMemo(() => (isComplete(formValues) ? assess(formValues) : null), [formValues]);

      const canViewProject = (project) => project.status !== "Draft" || currentUser.isAdmin || project.createdBy === currentUser.name;
      const isAssignedToCurrentUser = (project) => [project.projectManager, project.primarySponsor, project.createdBy].includes(currentUser.name);
      const canResumeProject = (project) => project.status === "Draft" && (currentUser.isAdmin || project.createdBy === currentUser.name);

      const accessibleProjects = useMemo(() => projects.filter((project) => canViewProject(project)), [projects]);

      const filteredProjects = useMemo(() => accessibleProjects.filter((project) => {
        const haystack = [project.name, project.department, project.projectManager, project.primarySponsor, project.strategicPillar].join(" ").toLowerCase();
        const matchesSearch = !search || haystack.includes(search.toLowerCase());
        const matchesStatus = statusFilter === "All statuses" || project.status === statusFilter;
        const matchesDepartment = departmentFilter === "All departments" || project.department === departmentFilter;
        const matchesPm = pmFilter === "All PMs" || project.projectManager === pmFilter;
        const matchesSponsor = sponsorFilter === "All sponsors" || project.primarySponsor === sponsorFilter;
        const matchesView = activeNavKey !== "my-projects" || isAssignedToCurrentUser(project);
        return matchesSearch && matchesStatus && matchesDepartment && matchesPm && matchesSponsor && matchesView;
      }), [accessibleProjects, activeNavKey, search, statusFilter, departmentFilter, pmFilter, sponsorFilter]);

      const sortedProjects = useMemo(() => {
        const getSortValue = (project, key) => {
          if (key === "completionPercentage") return project.completionPercentage;
          if (key === "tshirtSize") return project.tshirtSize;
          return `${project[key] || ""}`.toLowerCase();
        };

        return [...filteredProjects].sort((left, right) => {
          const leftValue = getSortValue(left, sortConfig.key);
          const rightValue = getSortValue(right, sortConfig.key);

          if (leftValue === rightValue) return 0;
          const comparison = leftValue > rightValue ? 1 : -1;
          return sortConfig.direction === "asc" ? comparison : comparison * -1;
        });
      }, [filteredProjects, sortConfig]);

      const departments = [...new Set(accessibleProjects.map((project) => project.department))];
      const managers = [...new Set(accessibleProjects.map((project) => project.projectManager))];
      const sponsors = [...new Set(accessibleProjects.map((project) => project.primarySponsor))];
      const reportProjects = accessibleProjects.filter((project) => project.status !== "Draft");
      const isPortfolioPage = pageKey === "portfolio";
      const isRoadmapView = pageKey === "roadmap";
      const isReportsView = pageKey === "reports";
      const isSettingsView = pageKey === "settings";
      const isMyProjectsView = isPortfolioPage && activeNavKey === "my-projects";
      const pageTitle = isRoadmapView ? "Roadmap" : isReportsView ? "Reports" : isSettingsView ? "Settings" : isMyProjectsView ? "My projects" : "Project portfolio";
      const pageSectionTitle = isMyProjectsView ? "My Projects" : "Portfolio Home";
      const pageSectionCopy = isMyProjectsView
        ? "Projects where you are the manager, sponsor, or draft owner."
        : "All visible projects across the portfolio.";
      const pageCountBadge = isRoadmapView
        ? `${reportProjects.length} roadmap projects`
        : isReportsView
          ? `${reportProjects.length} reportable projects`
          : isSettingsView
            ? `${Object.keys(documentTemplates).length} template controls`
            : `${filteredProjects.length} projects`;
      const currentProfile = selectedPersonName
        ? {
            firstName: selectedPersonName.split(" ")[0] || selectedPersonName,
            fullName: selectedPersonName,
            title: selectedPersonName === currentUser.name ? currentUser.roleLabel : "Portfolio contributor",
            department: projects.find((project) => project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName)?.department || "Portfolio",
            ...(profiles[selectedPersonName] || {})
          }
        : null;
      const currentProfileStats = selectedPersonName ? {
        projectsAsManager: projects.filter((project) => project.projectManager === selectedPersonName).length,
        projectsAsSponsor: projects.filter((project) => project.primarySponsor === selectedPersonName).length,
        activeProjects: projects.filter((project) => (project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName) && project.status !== "Completed").length,
        hitRate: Math.round(((projects.filter((project) => project.projectManager === selectedPersonName && project.status === "Completed").length || 0) / Math.max(1, projects.filter((project) => project.projectManager === selectedPersonName).length)) * 100),
        managerActivity: Math.min(98, 55 + (projects.filter((project) => project.projectManager === selectedPersonName).length * 7)),
        actionUpdateRate: profiles[selectedPersonName]?.actionUpdateRate || Math.min(96, 60 + (projects.filter((project) => project.projectManager === selectedPersonName || project.primarySponsor === selectedPersonName).length * 5))
      } : null;
      const columnDefinitions = [
        { key: "name", label: "Project name" },
        { key: "status", label: "Status" },
        { key: "projectManager", label: "Manager" },
        { key: "primarySponsor", label: "Sponsor" },
        { key: "department", label: "Department" },
        { key: "tshirtSize", label: "Size" },
        { key: "completionPercentage", label: "Completion" },
        { key: "action", label: "Action" }
      ];

      const onChange = (event) => {
        const { name, value } = event.target;
        setDraftMessage("");
        setFormValues((current) => ({ ...current, [name]: value }));
      };

      const getDraftCompletion = (values) => {
        const completedFields = Object.values(values).filter(Boolean).length;
        return Math.round((completedFields / Object.keys(defaultForm).length) * 100);
      };

      const toggleSort = (key) => {
        if (key === "action") return;
        setSortConfig((current) => {
          if (current.key === key) {
            return { key, direction: current.direction === "asc" ? "desc" : "asc" };
          }

          return { key, direction: "asc" };
        });
      };

      const saveDraft = () => {
        if (!formValues.projectName) {
          setDraftMessage("Add at least a project name before saving a draft.");
          return;
        }

        const savedAssessment = isComplete(formValues) ? assess(formValues) : null;
        const budgetLabel = intakeOptions.budgetBands.find((item) => item.value === formValues.budgetBand)?.label || "To be confirmed";
        const draftId = editingDraftId || `draft-${Date.now()}`;
        const draftProject = {
          id: draftId,
          name: formValues.projectName || "Untitled draft",
          status: "Draft",
          tshirtSize: savedAssessment ? savedAssessment.tshirtSize : "TBC",
          completionPercentage: getDraftCompletion(formValues),
          projectManager: formValues.projectManager || currentUser.name,
          primarySponsor: formValues.primarySponsor || "To be confirmed",
          department: formValues.department || "To be confirmed",
          projectType: formValues.audienceType === "client" ? "Client-facing initiative" : formValues.audienceType === "internal" ? "Internal initiative" : "Draft project",
          strategicPillar: formValues.strategicPillar || "To be confirmed",
          budget: budgetLabel,
          overallScore: savedAssessment ? savedAssessment.score : 0,
          currentRisk: "Draft - awaiting submission",
          whatHappenedLastMonth: "Draft saved and ready to be completed.",
          currentPosition: "The intake form has been started but not yet submitted.",
          next30DaysPipeline: "Complete the remaining fields, upload the required documents, and submit the application.",
          steeringDecisionNeeded: "No steering decision is needed until the draft has been completed and submitted.",
          businessObjective: formValues.oneLineJustification || "Business objective still being captured.",
          projectHealthChartData: buildRadarDefaults(savedAssessment ? savedAssessment.score : 20),
          projectHealthTriangleData: null,
          healthCheckReportUrl: "",
          createdBy: editingDraftId
            ? projects.find((project) => project.id === editingDraftId)?.createdBy || currentUser.name
            : currentUser.name,
          draftFormValues: normaliseFormValues(formValues)
        };

        setProjects((current) => [draftProject, ...current.filter((project) => project.id !== draftProject.id)]);
        setEditingDraftId(draftId);
        setDraftMessage("Draft saved. Use Resume form completion to pick up where you left off.");
      };

      const clearFilters = () => {
        setSearch("");
        setStatusFilter("All statuses");
        setDepartmentFilter("All departments");
        setPmFilter("All PMs");
        setSponsorFilter("All sponsors");
      };

      const buildRadarDefaults = (score) => {
        const base = Math.max(1, Math.min(5, Math.round(score / 20)));
        return {
          governance: base,
          sponsorEngagement: Math.min(5, base + 1),
          scope: base,
          budget: base,
          schedule: Math.max(1, base - 1),
          resourcing: Math.max(1, base - 1),
          riskIssues: base,
          quality: Math.min(5, base + 1)
        };
      };

      const resetDraftState = () => {
        setEditingDraftId(null);
        setFormValues(defaultForm);
        setDraftMessage("");
      };

      const startNewProject = () => {
        setSelectedProject(null);
        resetDraftState();
        setIsIntakeOpen(true);
      };

      const resumeDraftProject = (project) => {
        const storedDraftState = getStoredDraftState();
        const budgetBand = intakeOptions.budgetBands.find((item) => item.label === project.budget)?.value || "";
        const fallbackValues = project.draftFormValues || normaliseFormValues({
          projectName: project.name,
          projectManager: project.projectManager,
          primarySponsor: project.primarySponsor,
          strategicPillar: project.strategicPillar,
          department: project.department !== "To be confirmed" ? project.department : "",
          status: "",
          budgetBand,
          deliveryTimeline: "",
          impactedTeams: "",
          clientSensitiveData: "",
          audienceType: project.projectType === "Client-facing initiative" ? "client" : project.projectType === "Internal initiative" ? "internal" : "",
          strategicImportance: "",
          oneLineJustification: project.businessObjective !== "Business objective still being captured." ? project.businessObjective : ""
        });
        const resumeValues = storedDraftState.editingDraftId === project.id ? storedDraftState.formValues : fallbackValues;

        setEditingDraftId(project.id);
        setFormValues(resumeValues);
        setDraftMessage(`Resumed draft for ${project.name}.`);
        setSelectedProject(null);
        setIsIntakeOpen(true);
      };

      const saveProjectEdits = (projectId, updates) => {
        setProjects((current) => current.map((project) => project.id === projectId ? hydrateProject({ ...project, ...updates }) : project));
        setSelectedProject((current) => current && current.id === projectId ? hydrateProject({ ...current, ...updates }) : current);
      };

      const openProfile = (personName) => setSelectedPersonName(personName);
      const saveProfile = (personName, values) => {
        setProfiles((current) => ({
          ...current,
          [personName]: {
            ...current[personName],
            ...values
          }
        }));
      };

      const submitProject = (event) => {
        event.preventDefault();
        if (!assessment) {
          event.currentTarget.reportValidity();
          return;
        }

        const budgetLabel = intakeOptions.budgetBands.find((item) => item.value === formValues.budgetBand)?.label || "";
        const projectId = editingDraftId || `project-${Date.now()}`;
        const existingDraft = projects.find((project) => project.id === editingDraftId);
        const project = {
          id: projectId,
          name: formValues.projectName,
          status: projectStatusFromForm(formValues.status),
          tshirtSize: assessment.tshirtSize,
          completionPercentage: 0,
          projectManager: formValues.projectManager,
          primarySponsor: formValues.primarySponsor,
          department: formValues.department,
          projectType: formValues.audienceType === "client" ? "Client-facing initiative" : "Internal initiative",
          strategicPillar: formValues.strategicPillar,
          budget: budgetLabel,
          overallScore: assessment.score,
          currentRisk: "To be assessed",
          whatHappenedLastMonth: "No update recorded yet.",
          currentPosition: "Submitted into the intake workflow.",
          next30DaysPipeline: "Review required documents and confirm governance actions.",
          steeringDecisionNeeded: "Confirm governance ownership and the first sponsor checkpoint.",
          businessObjective: formValues.oneLineJustification,
          projectHealthChartData: buildRadarDefaults(assessment.score),
          projectHealthTriangleData: buildTriangleFromIndicators({
            overallScore: assessment.score,
            status: projectStatusFromForm(formValues.status),
            currentRisk: "To be assessed"
          }),
          healthCheckReportUrl: "",
          createdBy: existingDraft?.createdBy || currentUser.name,
          draftFormValues: null
        };

        setProjects((current) => [project, ...current.filter((item) => item.id !== project.id)]);
        resetDraftState();
        setIsIntakeOpen(false);
      };

      const openProject = (project) => setSelectedProject(project);

      const onProjectRowKeyDown = (event, project) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openProject(project);
        }
      };

      return (
        <>
          <div className={`app-shell ${isNavOpen ? "nav-open" : ""}`}>
            <div className={`sidebar-overlay ${isNavOpen ? "show" : ""}`} onClick={() => setIsNavOpen(false)}></div>
            <aside className="sidebar">
              <div className="brand-block">
                <button className="sidebar-close-btn" type="button" aria-label="Close menu" onClick={() => setIsNavOpen(false)}>
                  <Icon icon="close" className="icon-only-svg" />
                </button>
                <div className="logo-row">
                  <img className="brand-logo" src="assets/mks-logo.svg" alt="Moore Kingston Smith logo" />
                  <div className="logo-text">
                    <strong>MOORE</strong>
                    <span>Kingston Smith</span>
                  </div>
                </div>
                <p className="brand-tag">Realising ambitions, together</p>
                <p className="brand-product">The MKS Way</p>
              </div>

              <div className="nav-section">
                <p className="nav-heading">Navigation</p>
                <nav className="nav">
                  {sidebarNav.map((item) => (
                    <a key={item.key} className={`nav-link ${activeNavKey === item.key ? "active" : ""}`} href={getNavHref(item.key)} onClick={() => setIsNavOpen(false)}>
                      <Icon icon={item.icon} />
                      {item.label}
                    </a>
                  ))}
                </nav>
              </div>

              <div className="sidebar-footer">
                {isPortfolioPage ? (
                  <button className="user-card user-profile-btn" type="button" onClick={() => openProfile(currentUser.name)}>
                    <div className="avatar">HK</div>
                    <div className="user-meta">
                      <strong>{currentUser.name}</strong>
                      <span>{currentUser.roleLabel}</span>
                    </div>
                  </button>
                ) : (
                  <a className="user-card user-profile-btn" href="index.html">
                    <div className="avatar">HK</div>
                    <div className="user-meta">
                      <strong>{currentUser.name}</strong>
                      <span>Profile on portfolio home</span>
                    </div>
                  </a>
                )}
              </div>
            </aside>

            <main className="main-content">
              <header className="topbar">
                <div className="topbar-left">
                  <button className="hamburger-btn" type="button" aria-label="Open menu" onClick={() => setIsNavOpen(true)}><Icon icon="menu" className="icon-only-svg" /></button>
                  <div className="topbar-brand">
                    <img className="topbar-logo" src="assets/mks-logo.svg" alt="Moore Kingston Smith logo" />
                    <span>Moore Kingston Smith</span>
                  </div>
                  <div className="topbar-title">
                    <h1>{pageTitle}</h1>
                    <span className="count-badge">{pageCountBadge}</span>
                  </div>
                </div>
                <button className="primary-btn" type="button" onClick={startNewProject}>+ New project</button>
              </header>

              <div className="content-area">
                {isRoadmapView ? (
                  <RoadmapView projects={accessibleProjects} scale={roadmapScale} onScaleChange={setRoadmapScale} />
                ) : isReportsView ? (
                  <ReportsView projects={accessibleProjects} />
                ) : isSettingsView ? (
                  <SettingsView projects={accessibleProjects} />
                ) : (
                  <>
                    <section className="stat-grid">
                      <article className="stat-card stat-navy"><div className="stat-chip"></div><p className="stat-label">Total projects</p><p className="stat-value">{filteredProjects.length}</p><div className="stat-subtext">All departments</div></article>
                      <article className="stat-card stat-blue"><div className="stat-chip"></div><p className="stat-label">Active</p><p className="stat-value">{filteredProjects.filter((p) => p.status === "Active").length}</p><div className="stat-subtext">In delivery</div></article>
                      <article className="stat-card stat-purple"><div className="stat-chip"></div><p className="stat-label">Submitted</p><p className="stat-value">{filteredProjects.filter((p) => p.status === "Submitted").length}</p><div className="stat-subtext">Awaiting decision</div></article>
                      <article className="stat-card stat-orange"><div className="stat-chip"></div><p className="stat-label">On hold</p><p className="stat-value">{filteredProjects.filter((p) => p.status === "On hold").length}</p><div className="stat-subtext">Paused</div></article>
                      <article className="stat-card stat-green"><div className="stat-chip"></div><p className="stat-label">Completed</p><p className="stat-value">{filteredProjects.filter((p) => p.status === "Completed").length}</p><div className="stat-subtext">Closed out</div></article>
                    </section>

                    <section className="toolbar">
                      <div className="search-wrap"><input className="search-input" type="search" placeholder="Search projects..." value={search} onChange={(event) => setSearch(event.target.value)} /></div>
                      <select value={statusFilter} onChange={(event) => setStatusFilter(event.target.value)}><option>All statuses</option>{intakeOptions.statuses.map((status) => <option key={status}>{status}</option>)}</select>
                      <select value={departmentFilter} onChange={(event) => setDepartmentFilter(event.target.value)}><option>All departments</option>{departments.map((department) => <option key={department}>{department}</option>)}</select>
                      <select value={pmFilter} onChange={(event) => setPmFilter(event.target.value)}><option>All PMs</option>{managers.map((manager) => <option key={manager}>{manager}</option>)}</select>
                      <select value={sponsorFilter} onChange={(event) => setSponsorFilter(event.target.value)}><option>All sponsors</option>{sponsors.map((sponsor) => <option key={sponsor}>{sponsor}</option>)}</select>
                      <button className="secondary-btn clear-filters-btn" type="button" onClick={clearFilters}>Clear filters</button>
                    </section>

                    <section>
                      <div className="section-header">
                        <p className="section-title">{pageSectionTitle}</p>
                        <p className="section-copy">{pageSectionCopy}</p>
                      </div>
                      <div className="portfolio-table-wrap desktop-only">
                        <table className="portfolio-table">
                          <thead>
                            <tr>
                              {columnDefinitions.map((column) => (
                                <th key={column.key}>
                                  <div className="table-header-cell">
                                    <button className="table-header-btn" type="button" onClick={() => toggleSort(column.key)} disabled={column.key === "action"}>
                                      <span>{column.label}</span>
                                      {column.key !== "action" && sortConfig.key === column.key && <span className="sort-state">{sortConfig.direction === "asc" ? "Asc" : "Desc"}</span>}
                                      {column.key !== "action" && <Icon icon="sort" className="table-sort-svg" />}
                                    </button>
                                  </div>
                                </th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {sortedProjects.map((project) => (
                              <tr key={project.id} className="clickable-row" tabIndex={0} onClick={() => openProject(project)} onKeyDown={(event) => onProjectRowKeyDown(event, project)}>
                                <td><div className="project-main">{project.name}</div><div className="project-sub">{project.projectType} · {getRoadmapPhaseLabel(project.roadmapPhase)}</div></td>
                                <td><span className={`status-pill ${getStatusClass(project.status)}`}>{project.status}</span></td>
                                <td><button className="profile-link table-profile-link" type="button" onClick={(event) => { event.stopPropagation(); openProfile(project.projectManager); }}>{project.projectManager}</button></td>
                                <td><button className="profile-link table-profile-link" type="button" onClick={(event) => { event.stopPropagation(); openProfile(project.primarySponsor); }}>{project.primarySponsor}</button></td>
                                <td>{project.department}</td>
                                <td><span className="size-badge">{project.tshirtSize}</span></td>
                                <td><div className="progress-wrap"><div className="progress-track"><div className={`progress-bar ${getProgressClass(project.status)}`} style={{ width: `${project.completionPercentage}%` }}></div></div><span className="progress-value">{project.completionPercentage}%</span></div></td>
                                <td className="row-action-cell">
                                  {canResumeProject(project) ? (
                                    <button
                                      className="secondary-btn table-action-btn"
                                      type="button"
                                      onClick={(event) => {
                                        event.stopPropagation();
                                        resumeDraftProject(project);
                                      }}
                                    >
                                      Resume form
                                    </button>
                                  ) : (
                                    <span className="table-action-placeholder">View details</span>
                                  )}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      {!filteredProjects.length && <p className="empty-state">No projects match this view and filter combination right now.</p>}
                    </section>
                  </>
                )}
              </div>
            </main>
          </div>

          <Modal isOpen={isIntakeOpen} onClose={() => setIsIntakeOpen(false)} titleId="projectIntakeTitle">
            <div className="modal-header">
              <div><p className="eyebrow">{editingDraftId ? "Resume draft" : "New project"}</p><h3 id="projectIntakeTitle">{editingDraftId ? "Resume project intake" : "Project intake"}</h3></div>
              <button className="icon-btn" type="button" aria-label="Close intake form" onClick={() => setIsIntakeOpen(false)}><Icon icon="close" className="icon-only-svg" /></button>
            </div>

            <form className="project-form" onSubmit={submitProject}>
              <div className="form-grid">
                <label><span>Project Name *</span><input type="text" name="projectName" value={formValues.projectName} onChange={onChange} required /></label>
                <label><span>Project Manager *</span><input type="text" name="projectManager" value={formValues.projectManager} onChange={onChange} required /></label>
                <label><span>Primary Sponsor *</span><input type="text" name="primarySponsor" value={formValues.primarySponsor} onChange={onChange} required /></label>
                <label><span>Strategic Pillar *</span><select name="strategicPillar" value={formValues.strategicPillar} onChange={onChange} required><option value="">Select</option>{intakeOptions.strategicPillars.map((item) => <option key={item} value={item}>{item}</option>)}</select></label>
                <label><span>Department *</span><select name="department" value={formValues.department} onChange={onChange} required><option value="">Select</option>{intakeOptions.departments.map((item) => <option key={item} value={item}>{item}</option>)}</select></label>
                <label><span>Status *</span><select name="status" value={formValues.status} onChange={onChange} required><option value="">Select</option>{intakeOptions.statuses.filter((item) => item !== "Completed").map((item) => <option key={item} value={item}>{item}</option>)}</select></label>
                <label><span>Estimated Budget *</span><select name="budgetBand" value={formValues.budgetBand} onChange={onChange} required><option value="">Select</option>{intakeOptions.budgetBands.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select></label>
                <label><span>Delivery Timeline *</span><select name="deliveryTimeline" value={formValues.deliveryTimeline} onChange={onChange} required><option value="">Select</option>{intakeOptions.deliveryTimeline.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select></label>
                <label><span>Impacted Teams *</span><select name="impactedTeams" value={formValues.impactedTeams} onChange={onChange} required><option value="">Select</option>{intakeOptions.impactedTeams.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select></label>
                <label><span>Client Sensitive Data *</span><select name="clientSensitiveData" value={formValues.clientSensitiveData} onChange={onChange} required><option value="">Select</option><option value="no">No</option><option value="yes">Yes</option></select></label>
                <label><span>Audience Type *</span><select name="audienceType" value={formValues.audienceType} onChange={onChange} required><option value="">Select</option>{intakeOptions.audienceType.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select></label>
                <label><span>Strategic Importance *</span><select name="strategicImportance" value={formValues.strategicImportance} onChange={onChange} required><option value="">Select</option>{intakeOptions.strategicImportance.map((item) => <option key={item.value} value={item.value}>{item.label}</option>)}</select></label>
              </div>

              <label className="full-width"><span>One-line Justification *</span><textarea name="oneLineJustification" rows="3" value={formValues.oneLineJustification} onChange={onChange} required placeholder="Summarise the business objective and expected outcome."></textarea></label>

              <section className="score-panel">
                <div className="score-card"><span>Total Project Score</span><strong>{assessment ? `${assessment.score}/${assessment.scoreOutOf}` : "-"}</strong></div>
                <div className="score-card"><span>T-shirt Size</span><strong>{assessment ? assessment.tshirtSize : "-"}</strong></div>
                <div className="score-card"><span>Recommended Route</span><strong>{assessment ? assessment.recommendedRoute : "Complete the form"}</strong></div>
              </section>

              <section className="justification-card">
                <strong>{assessment ? assessment.explanation : "Complete the intake to see why the project has been scored and routed this way."}</strong>
              </section>

              <section className="guidance-panel">
                <div><p className="eyebrow">Required Documents</p><h4>Download, complete, and attach each required document</h4></div>
                <div className="document-grid">
                  {(assessment ? assessment.requiredDocuments : []).map((doc) => (
                    <div className="document-item" key={doc}>
                      <div className="document-meta"><strong>{doc}</strong><span>{documentTemplates[doc]?.note || "Required for this route."}</span></div>
                      <div className="document-actions">
                        <a className="doc-link" href={documentTemplates[doc]?.file} download>Download</a>
                        <input className="file-input" type="file" aria-label={`Attach ${doc}`} accept=".doc,.docx,.pdf" />
                      </div>
                    </div>
                  ))}
                  {!assessment && <p className="form-note">Complete the mandatory fields to show the actual required documents here.</p>}
                </div>
              </section>

              {draftMessage && <p className="form-note">{draftMessage}</p>}

              <div className="form-actions">
                <button className="secondary-btn" type="button" onClick={saveDraft}>{editingDraftId ? "Update draft" : "Save draft"}</button>
                <button className="primary-btn" type="submit">Submit application</button>
              </div>
            </form>
          </Modal>

          {isPortfolioPage && <ProjectDetailModal project={selectedProject} onClose={() => setSelectedProject(null)} canResumeDraft={selectedProject ? canResumeProject(selectedProject) : false} onResumeDraft={resumeDraftProject} canEditProject={currentUser.isAdmin} onSaveProjectEdits={saveProjectEdits} onOpenProfile={openProfile} />}
          {isPortfolioPage && <ProfileModal personName={selectedPersonName} profile={currentProfile} stats={currentProfileStats} onClose={() => setSelectedPersonName("")} onSave={saveProfile} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  


  </script>
</body>
</html>
